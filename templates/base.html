<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}CG1618 Tracker{% endblock %}</title>

    <!-- Tailwind CSS & FontAwesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Roboto:wght@400;500;700&family=Fira+Code:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Roboto", "Noto Sans TC", "sans-serif"],
              mono: ["Fira Code", "monospace"],
            },
            colors: { brand: { DEFAULT: "#6366f1", hover: "#4f46e5" } },
          },
        },
      };
    </script>

    <style>
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #f3f4f6; }
      ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
      .search-dropdown { max-height: 450px; overflow-y: auto; }
      {% block extra_style %}{% endblock %}
    </style>
  </head>
  <body
    class="bg-gray-50 text-gray-900 min-h-screen flex flex-col font-sans relative"
  >
    <!-- Universal Top Navigation Bar -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
          <div class="flex items-center space-x-8">
            <a
              href="/"
              class="flex-shrink-0 font-bold text-2xl tracking-wider text-brand hover:opacity-80 transition cursor-pointer"
            >
              CG1618
            </a>
            <div class="hidden md:block">
              <div class="flex items-baseline space-x-4">
                <a
                  href="/"
                  class="{% if request.url.path == '/' %}bg-gray-100 text-gray-900{% else %}text-gray-600 hover:text-gray-900 hover:bg-gray-100{% endif %} px-3 py-2 rounded-md text-sm font-medium transition"
                  >Dashboard</a
                >
                <a
                  href="/library"
                  class="{% if request.url.path == '/library' %}bg-gray-100 text-gray-900{% else %}text-gray-600 hover:text-gray-900 hover:bg-gray-100{% endif %} px-3 py-2 rounded-md text-sm font-medium transition"
                  >Library</a
                >

                <!-- Admin Dropdown (Visible only if logged in, or always visible but links will be protected later) -->
                {% if is_admin %}
                <div class="relative group">
                  <button
                    class="{% if request.url.path in ['/system', '/add', '/modify', '/delete'] %}bg-gray-100 text-gray-900{% else %}text-gray-600{% endif %} group-hover:text-gray-900 group-hover:bg-gray-100 px-3 py-2 rounded-md text-sm font-medium transition inline-flex items-center"
                  >
                    Admin <i class="fas fa-chevron-down ml-1.5 text-[10px]"></i>
                  </button>
                  <div
                    class="absolute left-0 top-full pt-1 w-32 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50"
                  >
                    <div
                      class="bg-white border border-gray-200 rounded-lg shadow-lg overflow-hidden flex flex-col"
                    >
                      <a
                        href="/system"
                        class="px-4 py-2.5 text-sm {% if request.url.path == '/system' %}text-brand bg-brand/5{% else %}text-gray-700 hover:bg-brand/5 hover:text-brand{% endif %} font-medium transition border-b border-gray-100"
                        >Admin</a
                      >
                      <a
                        href="/add"
                        class="px-4 py-2.5 text-sm {% if request.url.path == '/add' %}text-brand bg-brand/5{% else %}text-gray-700 hover:bg-brand/5 hover:text-brand{% endif %} font-medium transition border-b border-gray-100"
                        >Add</a
                      >
                      <a
                        href="/modify"
                        class="px-4 py-2.5 text-sm {% if request.url.path == '/modify' %}text-brand bg-brand/5{% else %}text-gray-700 hover:bg-brand/5 hover:text-brand{% endif %} font-medium transition border-b border-gray-100"
                        >Modify</a
                      >
                      <a
                        href="/delete"
                        class="px-4 py-2.5 text-sm {% if request.url.path == '/delete' %}text-red-600 bg-red-50{% else %}text-red-500 hover:bg-red-50{% endif %} font-medium transition"
                        >Delete</a
                      >
                    </div>
                  </div>
                </div>
                {% endif %}
              </div>
            </div>
          </div>

          <div class="flex items-center space-x-4 flex-1 justify-end">
            <!-- Global Search -->
            <div
              class="relative w-full max-w-xs hidden sm:block"
              id="globalSearchContainer"
            >
              <div
                class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
              >
                <i class="fas fa-search text-gray-400"></i>
              </div>
              <input
                type="text"
                id="globalSearchInput"
                oninput="handleGlobalSearch(this.value)"
                class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md leading-5 bg-white text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-brand focus:border-brand sm:text-sm transition"
                placeholder="Search..."
                autocomplete="off"
              />
              <div
                id="searchSuggestions"
                class="absolute left-0 right-0 top-full mt-1 bg-white border border-gray-200 rounded-md shadow-xl z-[100] hidden search-dropdown"
              ></div>
            </div>

            {% if is_admin %}
            <button
              onclick="handleGlobalSync()"
              id="globalSyncBtn"
              class="bg-brand hover:bg-brand-hover text-white px-4 py-2 rounded-md text-sm font-medium flex items-center transition shadow-sm"
            >
              <i class="fas fa-sync-alt mr-2" id="globalSyncIcon"></i> Sync
            </button>
            <button
              onclick="handleLogout()"
              class="text-gray-500 hover:text-red-600 px-3 py-2 text-sm font-bold transition"
            >
              <i class="fas fa-sign-out-alt"></i>
            </button>
            {% else %}
            <a
              href="/login"
              class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-md text-sm font-bold transition"
            >
              <i class="fas fa-sign-in-alt mr-2"></i> Admin Login
            </a>
            {% endif %}
          </div>
        </div>
      </div>
    </nav>

    <main class="flex-1 w-full">{% block content %}{% endblock %}</main>

    <footer class="bg-white border-t border-gray-200 mt-auto">
      <div
        class="max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8 flex justify-center text-sm text-gray-500"
      >
        &copy; 2026 CG1618 Anime Database. Guest Mode: View Only.
      </div>
    </footer>

    <!-- Toast Notification -->
    <div
      id="toast"
      class="fixed bottom-6 right-6 z-[100] transform transition-all duration-300 translate-y-20 opacity-0 bg-gray-900 text-white px-6 py-3 rounded-lg shadow-2xl flex items-center pointer-events-none"
    >
      <i id="toast-icon" class="fas fa-info-circle mr-3 text-lg"></i>
      <span id="toast-msg" class="font-medium text-sm"></span>
    </div>

    <script>
      const GLOBAL_API_BASE = "/api";

      async function handleLogout() {
        try {
          const response = await fetch("/api/v1/auth/logout", {
            method: "POST",
          });
          if (response.ok) {
            window.location.href = "/"; // Redirect to guest dashboard
          }
        } catch (error) {
          console.error("Logout failed", error);
        }
      }

      function showToast(message, isError = false) {
        const toast = document.getElementById("toast");
        const msg = document.getElementById("toast-msg");
        msg.innerText = message;
        toast.classList.remove("translate-y-20", "opacity-0");
        setTimeout(
          () => toast.classList.add("translate-y-20", "opacity-0"),
          4000,
        );
      }

      // Note: Search metadata loading logic is kept here as well
      // ... (Rest of global search JS from previous versions) ...
    </script>
    {% block extra_scripts %}{% endblock %}
  </body>
</html>
