<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}CG1618 Tracker{% endblock %}</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Roboto:wght@400;500;700&family=Fira+Code:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Roboto", "Noto Sans TC", "sans-serif"],
              mono: ["Fira Code", "monospace"],
            },
            colors: { brand: { DEFAULT: "#6366f1", hover: "#4f46e5" } },
          },
        },
      };
    </script>

    <style>
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #f3f4f6; }
      ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

      .search-dropdown { max-height: 450px; overflow-y: auto; }
      .bg-glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }

      @keyframes pulse-soft {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.7; }
      }
      .animate-pulse-soft { animation: pulse-soft 2s infinite; }

      {% block extra_style %}{% endblock %}
    </style>
    {% block extra_head %}{% endblock %}
  </head>
  <body
    class="bg-gray-50 text-gray-900 min-h-screen flex flex-col font-sans relative"
  >
    <!-- Universal Top Navigation Bar -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
          <div class="flex items-center space-x-8">
            <a
              href="/"
              class="flex-shrink-0 font-bold text-2xl tracking-wider text-brand hover:opacity-80 transition cursor-pointer"
            >
              CG1618
            </a>
            <div class="hidden md:block">
              <div class="flex items-baseline space-x-4">
                <a
                  href="/"
                  class="{% if request.url.path == '/' %}bg-gray-100 text-gray-900{% else %}text-gray-600 hover:text-gray-900 hover:bg-gray-100{% endif %} px-3 py-2 rounded-md text-sm font-medium transition"
                  >Dashboard</a
                >
                <a
                  href="/library"
                  class="{% if request.url.path == '/library' %}bg-gray-100 text-gray-900{% else %}text-gray-600 hover:text-gray-900 hover:bg-gray-100{% endif %} px-3 py-2 rounded-md text-sm font-medium transition"
                  >Library</a
                >

                <!-- Admin Dropdown -->
                <div class="relative group">
                  <button
                    class="{% if request.url.path in ['/system', '/add', '/modify', '/delete'] %}bg-gray-100 text-gray-900{% else %}text-gray-600{% endif %} group-hover:text-gray-900 group-hover:bg-gray-100 px-3 py-2 rounded-md text-sm font-medium transition inline-flex items-center"
                  >
                    Admin <i class="fas fa-chevron-down ml-1.5 text-[10px]"></i>
                  </button>
                  <div
                    class="absolute left-0 top-full pt-1 w-32 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50"
                  >
                    <div
                      class="bg-white border border-gray-200 rounded-lg shadow-lg overflow-hidden flex flex-col"
                    >
                      <a
                        href="/system"
                        class="px-4 py-2.5 text-sm {% if request.url.path == '/system' %}text-brand bg-brand/5{% else %}text-gray-700 hover:bg-brand/5 hover:text-brand{% endif %} font-medium transition border-b border-gray-100"
                        >Admin</a
                      >
                      <a
                        href="/add"
                        class="px-4 py-2.5 text-sm {% if request.url.path == '/add' %}text-brand bg-brand/5{% else %}text-gray-700 hover:bg-brand/5 hover:text-brand{% endif %} font-medium transition border-b border-gray-100"
                        >Add</a
                      >
                      <a
                        href="/modify"
                        class="px-4 py-2.5 text-sm {% if request.url.path == '/modify' %}text-brand bg-brand/5{% else %}text-gray-700 hover:bg-brand/5 hover:text-brand{% endif %} font-medium transition border-b border-gray-100"
                        >Modify</a
                      >
                      <a
                        href="/delete"
                        class="px-4 py-2.5 text-sm {% if request.url.path == '/delete' %}text-red-600 bg-red-50{% else %}text-red-500 hover:bg-red-50{% endif %} font-medium transition"
                        >Delete</a
                      >
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="flex items-center space-x-4 flex-1 justify-end">
            <!-- Global Search with Series-First Suggestions -->
            <div
              class="relative w-full max-w-md hidden sm:block"
              id="globalSearchContainer"
            >
              <div
                class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
              >
                <i class="fas fa-search text-gray-400"></i>
              </div>
              <input
                type="text"
                id="globalSearchInput"
                oninput="handleGlobalSearch(this.value)"
                class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md leading-5 bg-white text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-brand focus:border-brand sm:text-sm transition"
                placeholder="Search Series or Anime..."
                autocomplete="off"
              />

              <!-- JS Injected Suggestions -->
              <div
                id="searchSuggestions"
                class="absolute left-0 right-0 top-full mt-1 bg-white border border-gray-200 rounded-md shadow-xl z-[100] hidden search-dropdown"
              ></div>
            </div>

            <button
              onclick="handleGlobalSync()"
              id="globalSyncBtn"
              class="bg-brand hover:bg-brand-hover text-white px-4 py-2 rounded-md text-sm font-medium flex items-center transition shadow-sm"
            >
              <i class="fas fa-sync-alt mr-2" id="globalSyncIcon"></i> Sync
            </button>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content Container -->
    <main class="flex-1 w-full">{% block content %}{% endblock %}</main>

    <!-- Universal Footer -->
    <footer class="bg-white border-t border-gray-200 mt-auto">
      <div
        class="max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8 flex justify-center text-sm text-gray-500"
      >
        &copy; 2026 CG1618 Anime Database. All records mirrored from Google
        Sheets.
      </div>
    </footer>

    <!-- Scroll to Top Button -->
    <button
      id="scrollToTopBtn"
      onclick="scrollToTop()"
      class="fixed bottom-20 right-6 z-[60] bg-brand hover:bg-brand-hover text-white w-12 h-12 rounded-full shadow-xl flex items-center justify-center transition-all duration-300 opacity-0 translate-y-4 pointer-events-none"
    >
      <i class="fas fa-arrow-up"></i>
    </button>

    <!-- Global Toast Notification -->
    <div
      id="toast"
      class="fixed bottom-6 right-6 z-[100] transform transition-all duration-300 translate-y-20 opacity-0 bg-gray-900 text-white px-6 py-3 rounded-lg shadow-2xl flex items-center pointer-events-none"
    >
      <i id="toast-icon" class="fas fa-info-circle mr-3 text-lg"></i>
      <span id="toast-msg" class="font-medium text-sm"></span>
    </div>

    <!-- Global Logic Scripts -->
    <script>
      const GLOBAL_API_BASE = "/api";
      let _globalAnimeCache = [];
      let _globalSeriesCache = [];

      // --- 1. Notification Engine ---
      function showToast(message, isError = false) {
        const toast = document.getElementById("toast");
        const msg = document.getElementById("toast-msg");
        const icon = document.getElementById("toast-icon");

        msg.innerText = message;
        if (isError) {
          icon.className =
            "fas fa-exclamation-circle mr-3 text-red-400 text-lg";
          toast.classList.replace("bg-gray-900", "bg-red-900");
        } else {
          icon.className = "fas fa-check-circle mr-3 text-emerald-400 text-lg";
          toast.classList.replace("bg-red-900", "bg-gray-900");
        }

        toast.classList.remove("translate-y-20", "opacity-0");
        setTimeout(
          () => toast.classList.add("translate-y-20", "opacity-0"),
          4000,
        );
      }

      // --- 2. Global Search & Suggestions Engine ---
      async function _loadSearchMetadata() {
        try {
          const [aRes, sRes] = await Promise.all([
            fetch(`${GLOBAL_API_BASE}/anime`),
            fetch(`${GLOBAL_API_BASE}/series`),
          ]);
          if (aRes.ok) _globalAnimeCache = await aRes.json();
          if (sRes.ok) _globalSeriesCache = await sRes.json();
        } catch (e) {
          console.error("Global search metadata failed to load", e);
        }
      }

      function normalize(str) {
        if (!str) return "";
        return String(str)
          .toLowerCase()
          .replace(/[^\p{L}\p{N}]/gu, "");
      }

      function handleGlobalSearch(query) {
        const suggestionsDiv = document.getElementById("searchSuggestions");
        if (!query || query.trim().length < 1) {
          suggestionsDiv.classList.add("hidden");
          return;
        }

        const qNorm = normalize(query);
        const seriesResults = [];
        const animeResults = [];

        // Search Series (Prioritized)
        _globalSeriesCache.forEach((s) => {
          const matchText = [
            s.series_en,
            s.series_cn,
            s.alt_name,
            s.series_roman,
          ]
            .filter(Boolean)
            .join(" ");
          if (normalize(matchText).includes(qNorm)) seriesResults.push(s);
        });

        // Search Anime
        _globalAnimeCache.forEach((a) => {
          const matchText = [
            a.series_season_cn,
            a.series_season_en,
            a.series_en,
            a.series_season_roman,
          ]
            .filter(Boolean)
            .join(" ");
          if (normalize(matchText).includes(qNorm)) animeResults.push(a);
        });

        const results = [
          ...seriesResults.map((s) => ({ type: "series", data: s })),
          ...animeResults.map((a) => ({ type: "anime", data: a })),
        ].slice(0, 12);

        if (results.length === 0) {
          suggestionsDiv.classList.add("hidden");
          return;
        }

        suggestionsDiv.innerHTML = results
          .map((res) => {
            if (res.type === "series") {
              const s = res.data;
              return `
                    <div class="px-4 py-3 hover:bg-brand/5 cursor-pointer border-b border-gray-100 last:border-0 transition-colors" 
                         onclick="window.location.href='/series/${s.system_id}'">
                        <div class="flex items-center mb-1">
                            <span class="text-[9px] font-bold uppercase tracking-wider text-purple-600 bg-purple-50 px-1.5 py-0.5 rounded border border-purple-100">Series Hub</span>
                        </div>
                        <div class="text-sm font-bold text-gray-900 truncate">${s.series_en}</div>
                        <div class="text-[11px] text-gray-500 truncate mt-0.5">${s.series_cn || ""} ${s.alt_name ? `(${s.alt_name})` : ""}</div>
                    </div>
                  `;
            } else {
              const a = res.data;
              const parentSeries = _globalSeriesCache.find(
                (s) => s.series_en === a.series_en,
              );
              const seriesDisplayName = parentSeries
                ? parentSeries.series_cn || parentSeries.series_en
                : a.series_en;
              return `
                    <div class="px-4 py-3 hover:bg-brand/5 cursor-pointer border-b border-gray-100 last:border-0 transition-colors" 
                         onclick="window.location.href='/anime/${a.system_id}'">
                        <div class="flex items-center justify-between mb-1">
                            <span class="text-[9px] font-bold uppercase tracking-wider text-brand bg-brand/5 px-1.5 py-0.5 rounded border border-brand/10">Anime Entry</span>
                            <span class="text-[10px] text-gray-400 font-bold uppercase">${a.airing_type || "TV"}</span>
                        </div>
                        <div class="text-sm font-bold text-gray-900 truncate">${a.series_season_cn || a.series_season_en || a.series_en}</div>
                        <div class="text-[11px] text-gray-500 truncate mt-0.5 italic">From series: ${seriesDisplayName}</div>
                    </div>
                  `;
            }
          })
          .join("");

        suggestionsDiv.classList.remove("hidden");
      }

      // --- 3. Scroll to Top Engine ---
      window.addEventListener("scroll", () => {
        const btn = document.getElementById("scrollToTopBtn");
        if (window.scrollY > 400) {
          btn.classList.remove(
            "opacity-0",
            "translate-y-4",
            "pointer-events-none",
          );
          btn.classList.add(
            "opacity-100",
            "translate-y-0",
            "pointer-events-auto",
          );
        } else {
          btn.classList.add(
            "opacity-0",
            "translate-y-4",
            "pointer-events-none",
          );
          btn.classList.remove(
            "opacity-100",
            "translate-y-0",
            "pointer-events-auto",
          );
        }
      });

      function scrollToTop() {
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      // --- 4. Global Sync Engine ---
      async function handleGlobalSync() {
        const icon = document.getElementById("globalSyncIcon");
        const btn = document.getElementById("globalSyncBtn");

        icon.classList.add("fa-spin");
        btn.classList.add("opacity-75", "pointer-events-none");

        try {
          const res = await fetch(`${GLOBAL_API_BASE}/admin/sync`, {
            method: "POST",
          });
          if (!res.ok) throw new Error("Sync failed");

          icon.classList.remove("fa-spin", "fa-sync-alt");
          icon.classList.add("fa-check");
          btn.classList.replace("bg-brand", "bg-emerald-500");
          btn.innerText = " Synced!";
          btn.prepend(icon);

          showToast("Sync complete. Database is up to date.");
          _loadSearchMetadata(); // Refresh global search data

          // Trigger page-specific refresh if the page defines onSyncComplete()
          if (typeof onSyncComplete === "function") onSyncComplete();

          setTimeout(() => {
            icon.className = "fas fa-sync-alt mr-2";
            btn.className =
              "bg-brand hover:bg-brand-hover text-white px-4 py-2 rounded-md text-sm font-medium flex items-center transition shadow-sm";
            btn.innerText = " Sync";
            btn.prepend(icon);
          }, 2500);
        } catch (err) {
          icon.classList.remove("fa-spin");
          btn.classList.remove("opacity-75", "pointer-events-none");
          showToast("Sync Error: Failed to reach server.", true);
        }
      }

      // Initialize
      document.addEventListener("DOMContentLoaded", () => {
        _loadSearchMetadata();

        // Enter key for search
        document
          .getElementById("globalSearchInput")
          .addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
              const q = e.target.value.trim();
              if (q)
                window.location.href = `/search?q=${encodeURIComponent(q)}`;
            }
          });

        // Click outside search logic
        document.addEventListener("click", (e) => {
          const container = document.getElementById("globalSearchContainer");
          if (container && !container.contains(e.target)) {
            document
              .getElementById("searchSuggestions")
              .classList.add("hidden");
          }
        });
      });
    </script>

    {% block extra_scripts %}{% endblock %}
  </body>
</html>
