{% extends "base.html" %} {% block title %}Admin Login - CG1618 Tracker{%
endblock %} {% block content %}
<div
  class="flex items-center justify-center min-h-[calc(100vh-130px)] px-4 py-12"
>
  <div
    class="bg-white p-8 rounded-2xl shadow-xl border border-gray-200 w-full max-w-md relative overflow-hidden"
  >
    <!-- Top decorative bar -->
    <div class="absolute top-0 left-0 right-0 h-1.5 bg-brand"></div>

    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-gray-900 mb-2">
        <i class="fas fa-lock text-brand mr-2"></i>Admin Access
      </h1>
      <p class="text-sm text-gray-500">
        Sign in to manage the CG1618 database and synchronize with Google
        Sheets.
      </p>
    </div>

    <form id="login-form" class="space-y-6">
      <div>
        <label
          for="username"
          class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-2"
          >Username</label
        >
        <div class="relative">
          <div
            class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
          >
            <i class="fas fa-user text-gray-400"></i>
          </div>
          <input
            type="text"
            id="username"
            name="username"
            required
            class="block w-full pl-10 pr-3 py-2.5 border border-gray-300 rounded-lg leading-5 bg-gray-50 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand focus:border-brand sm:text-sm transition"
            placeholder="admin"
          />
        </div>
      </div>

      <div>
        <label
          for="password"
          class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-2"
          >Password</label
        >
        <div class="relative">
          <div
            class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
          >
            <i class="fas fa-key text-gray-400"></i>
          </div>
          <input
            type="password"
            id="password"
            name="password"
            required
            class="block w-full pl-10 pr-3 py-2.5 border border-gray-300 rounded-lg leading-5 bg-gray-50 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand focus:border-brand sm:text-sm transition"
            placeholder="••••••••"
          />
        </div>
      </div>

      <div
        id="error-message"
        class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg text-sm flex items-center"
      >
        <i class="fas fa-exclamation-circle mr-2"></i>
        <span class="font-medium"></span>
      </div>

      <div>
        <button
          type="submit"
          id="submit-btn"
          class="w-full flex justify-center items-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-brand hover:bg-brand-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand transition-all"
        >
          <span>Authenticate</span>
          <i class="fas fa-arrow-right ml-2 text-sm"></i>
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %} {% block extra_scripts %}
<script>
  document.addEventListener("DOMContentLoaded", () => {
    // 1. Cache DOM Elements
    const DOM = {
      loginForm: document.getElementById("login-form"),
      submitBtn: document.getElementById("submit-btn"),
      errorDiv: document.getElementById("error-message"),
      errorSpan: document.querySelector("#error-message span"),
    };

    if (DOM.loginForm) {
      // 2. Attach Event Listener (Separation of Concerns)
      DOM.loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const formData = new URLSearchParams(new FormData(DOM.loginForm));

        // Disable state
        DOM.submitBtn.disabled = true;
        DOM.submitBtn.innerHTML =
          '<i class="fas fa-circle-notch fa-spin mr-2"></i> Verifying...';
        DOM.errorDiv.classList.add("hidden");

        try {
          const response = await fetch("/api/v1/auth/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/x-www-form-urlencoded",
            },
            body: formData,
          });

          if (response.ok) {
            // Success! The browser automatically stores the HTTP-Only cookie set by the server.
            DOM.submitBtn.classList.replace("bg-brand", "bg-emerald-500");
            DOM.submitBtn.classList.replace(
              "hover:bg-brand-hover",
              "hover:bg-emerald-600",
            );
            DOM.submitBtn.innerHTML =
              '<i class="fas fa-check mr-2"></i> Access Granted';

            // Redirect to the system admin dashboard
            setTimeout(() => {
              window.location.href = "/system";
            }, 800);
          } else {
            // Failure
            DOM.errorDiv.classList.remove("hidden");
            const errData = await response.json();
            DOM.errorSpan.innerText =
              errData.detail || "Authentication failed.";
            DOM.submitBtn.disabled = false;
            DOM.submitBtn.innerHTML =
              '<span>Authenticate</span> <i class="fas fa-arrow-right ml-2 text-sm"></i>';
          }
        } catch (error) {
          DOM.errorDiv.classList.remove("hidden");
          DOM.errorSpan.innerText = "Network error. Please try again.";
          DOM.submitBtn.disabled = false;
          DOM.submitBtn.innerHTML =
            '<span>Authenticate</span> <i class="fas fa-arrow-right ml-2 text-sm"></i>';
        }
      });
    }
  });
</script>
{% endblock %}
