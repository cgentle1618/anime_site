<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library - CG1618 Tracker</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Roboto", "Noto Sans TC", "sans-serif"] },
            colors: { brand: { DEFAULT: "#6366f1", hover: "#4f46e5" } },
          },
        },
      };
    </script>
    <style>
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f3f4f6;
      }
      ::-webkit-scrollbar-thumb {
        background: #d1d5db;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #9ca3af;
      }
      .card-hover {
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }
      .card-hover:hover {
        transform: translateY(-4px);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      }
      .line-clamp-2 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
    </style>
  </head>
  <body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col font-sans">
    <!-- Universal Top Navigation Bar -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
          <div class="flex items-center space-x-8">
            <a
              href="/"
              class="flex-shrink-0 font-bold text-2xl tracking-wider text-brand"
              >CG1618</a
            >
            <div class="hidden md:block">
              <div class="flex items-baseline space-x-4">
                <a
                  href="/"
                  class="text-gray-600 hover:text-gray-900 hover:bg-gray-100 px-3 py-2 rounded-md text-sm font-medium transition"
                  >Dashboard</a
                >
                <a
                  href="/library"
                  class="bg-gray-100 text-gray-900 px-3 py-2 rounded-md text-sm font-medium transition"
                  >Library</a
                >

                <!-- Admin Dropdown -->
                <div class="relative group">
                  <button
                    class="text-gray-600 group-hover:text-gray-900 group-hover:bg-gray-100 px-3 py-2 rounded-md text-sm font-medium transition inline-flex items-center"
                  >
                    Admin <i class="fas fa-chevron-down ml-1.5 text-[10px]"></i>
                  </button>
                  <div
                    class="absolute left-0 top-full pt-1 w-32 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50"
                  >
                    <div
                      class="bg-white border border-gray-200 rounded-lg shadow-lg overflow-hidden flex flex-col"
                    >
                      <a
                        href="/system"
                        class="px-4 py-2.5 text-sm text-gray-700 hover:bg-brand/5 hover:text-brand font-medium transition border-b border-gray-100"
                        >Admin</a
                      >
                      <a
                        href="/add"
                        class="px-4 py-2.5 text-sm text-gray-700 hover:bg-brand/5 hover:text-brand font-medium transition"
                        >Add</a
                      >
                      <a
                        href="/modify"
                        class="px-4 py-2.5 text-sm text-gray-700 hover:bg-brand/5 hover:text-brand font-medium transition"
                        >Modify</a
                      >
                      <a
                        href="/delete"
                        class="px-4 py-2.5 text-sm text-red-600 bg-red-50 font-medium transition"
                        >Delete</a
                      >
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="flex items-center space-x-4 flex-1 justify-end">
            <div class="relative w-full max-w-md hidden sm:block">
              <div
                class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
              >
                <i class="fas fa-search text-gray-400"></i>
              </div>
              <input
                type="text"
                id="globalSearchInput"
                class="block w-full pl-10 pr-3 py-2 border border-gray-200 rounded-md leading-5 bg-white text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-brand focus:border-brand sm:text-sm transition"
                placeholder="Global Search..."
              />
            </div>
            <button
              onclick="handleSync()"
              id="syncBtn"
              class="bg-brand hover:bg-brand-hover text-white px-4 py-2 rounded-md text-sm font-medium flex items-center transition shadow-sm"
            >
              <i class="fas fa-sync-alt mr-2" id="syncIcon"></i> Sync
            </button>
          </div>
        </div>
      </div>
    </nav>

    <!-- Sticky Control Bar (Filters & Sorting) -->
    <div class="bg-white border-b border-gray-200 sticky top-16 z-40 shadow-sm">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3">
        <div
          class="flex flex-col sm:flex-row gap-4 items-center justify-between"
        >
          <!-- Local Filter Search -->
          <div class="relative w-full sm:w-1/3">
            <div
              class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
            >
              <i class="fas fa-filter text-gray-400"></i>
            </div>
            <input
              type="text"
              id="localFilterInput"
              class="block w-full pl-10 pr-3 py-2 border border-gray-200 rounded-md leading-5 bg-gray-50 text-gray-900 placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-brand focus:border-brand focus:bg-white sm:text-sm transition"
              placeholder="Filter current view..."
            />
          </div>

          <div class="flex flex-wrap items-center gap-3 w-full sm:w-auto">
            <!-- Status Dropdown -->
            <select
              id="statusFilter"
              class="block pl-3 pr-10 py-2 text-sm border border-gray-200 rounded-md focus:ring-brand focus:border-brand bg-gray-50 hover:bg-white transition cursor-pointer font-medium text-gray-700"
            >
              <option value="All">All Statuses</option>
              <option value="Active Watching">Active Watching</option>
              <option value="Passive Watching">Passive Watching</option>
              <option value="Completed">Completed</option>
              <option value="Paused">Paused / Dropped</option>
              <option value="Plan to Watch">Plan to Watch</option>
            </select>

            <!-- Sort Dropdown -->
            <select
              id="sortSelector"
              class="block pl-3 pr-10 py-2 text-sm border border-gray-200 rounded-md focus:ring-brand focus:border-brand bg-gray-50 hover:bg-white transition cursor-pointer font-medium text-gray-700"
            >
              <option value="titleAsc">Title (A-Z)</option>
              <option value="scoreDesc">MAL Score (High - Low)</option>
              <option value="myRatingDesc">My Rating (High - Low)</option>
              <option value="releaseDesc">Release Date (Newest)</option>
            </select>

            <span
              id="resultCount"
              class="text-xs font-bold text-gray-400 tracking-wider uppercase ml-2 hidden sm:inline-block"
              >Loading...</span
            >
          </div>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
      <!-- Loading State -->
      <div id="loading" class="flex flex-col items-center justify-center h-64">
        <i class="fas fa-circle-notch fa-spin text-4xl text-brand mb-4"></i>
        <p class="text-gray-500 font-medium">Loading massive library...</p>
      </div>

      <!-- Library Grid -->
      <div
        id="library-grid"
        class="hidden grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 sm:gap-6"
      >
        <!-- Cards injected via JS -->
      </div>

      <!-- Empty State (Hidden by default) -->
      <div
        id="empty-state"
        class="hidden flex-col items-center justify-center h-64 bg-white rounded-xl border border-gray-200 border-dashed mt-8"
      >
        <i class="fas fa-search text-4xl text-gray-300 mb-3"></i>
        <p class="text-gray-500 font-medium">No anime match your filters.</p>
        <button
          onclick="clearFilters()"
          class="mt-4 text-brand font-bold text-sm hover:underline"
        >
          Clear Filters
        </button>
      </div>
    </main>

    <!-- Global Toast Notification -->
    <div
      id="toast"
      class="fixed bottom-6 right-6 z-[100] transform transition-all duration-300 translate-y-20 opacity-0 bg-gray-900 text-white px-6 py-3 rounded-lg shadow-2xl flex items-center pointer-events-none"
    >
      <i id="toast-icon" class="fas fa-info-circle mr-3 text-lg"></i>
      <span id="toast-msg" class="font-medium text-sm"></span>
    </div>

    <!-- Logic -->
    <script>
      const API_BASE_URL = "/api";
      let allAnimeData = [];
      let debounceTimeout;

      // --- Core Event Listeners ---
      document.addEventListener("DOMContentLoaded", loadLibrary);

      document
        .getElementById("localFilterInput")
        .addEventListener("input", (e) => {
          clearTimeout(debounceTimeout);
          debounceTimeout = setTimeout(renderLibrary, 300); // Debounce typing for performance
        });
      document
        .getElementById("statusFilter")
        .addEventListener("change", renderLibrary);
      document
        .getElementById("sortSelector")
        .addEventListener("change", renderLibrary);

      const searchInput = document.getElementById("globalSearchInput");
      searchInput.addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
          const query = e.target.value.trim();
          if (query)
            window.location.href = `/search?q=${encodeURIComponent(query)}`;
        }
      });

      function clearFilters() {
        document.getElementById("localFilterInput").value = "";
        document.getElementById("statusFilter").value = "All";
        renderLibrary();
      }

      function showToast(message, isError = false) {
        const toast = document.getElementById("toast");
        const msg = document.getElementById("toast-msg");
        const icon = document.getElementById("toast-icon");

        msg.innerText = message;
        if (isError) {
          icon.className =
            "fas fa-exclamation-circle mr-3 text-red-400 text-lg";
          toast.classList.replace("bg-gray-900", "bg-red-900");
        } else {
          icon.className = "fas fa-check-circle mr-3 text-emerald-400 text-lg";
          toast.classList.replace("bg-red-900", "bg-gray-900");
        }

        toast.classList.remove("translate-y-20", "opacity-0");
        setTimeout(
          () => toast.classList.add("translate-y-20", "opacity-0"),
          3000,
        );
      }

      // --- Data Fetching & Organization ---
      async function loadLibrary() {
        try {
          const res = await fetch(`${API_BASE_URL}/anime`);
          if (!res.ok) throw new Error("Failed to load anime data");
          allAnimeData = await res.json();

          document.getElementById("loading").classList.add("hidden");
          renderLibrary();
        } catch (error) {
          document.getElementById("loading").innerHTML = `
                <div class="text-center text-red-600 bg-red-50 p-6 rounded-xl border border-red-200">
                    <i class="fas fa-exclamation-triangle mb-2 text-2xl"></i>
                    <p class="font-bold">Error loading library data.</p>
                    <p class="text-sm mt-1">${error.message}</p>
                </div>`;
        }
      }

      // --- In-Memory Sorting & Filtering Engine ---
      function renderLibrary() {
        const grid = document.getElementById("library-grid");
        const emptyState = document.getElementById("empty-state");

        const query = document
          .getElementById("localFilterInput")
          .value.toLowerCase()
          .trim();
        const statusVal = document.getElementById("statusFilter").value;
        const sortVal = document.getElementById("sortSelector").value;

        // 1. Filter
        let filtered = allAnimeData.filter((anime) => {
          // Status Match
          let matchesStatus = true;
          if (statusVal === "Paused") {
            matchesStatus =
              anime.my_progress === "Paused" ||
              anime.my_progress === "Temp Dropped";
          } else if (statusVal !== "All") {
            matchesStatus = anime.my_progress === statusVal;
          }

          // Text Match (Searches across multiple language titles)
          let matchesText = true;
          if (query) {
            const searchStr =
              `${anime.series_season_cn || ""} ${anime.series_season_en || ""} ${anime.series_en || ""} ${anime.series_season_roman || ""}`.toLowerCase();
            matchesText = searchStr.includes(query);
          }

          return matchesStatus && matchesText;
        });

        // 2. Sort
        filtered.sort((a, b) => {
          if (sortVal === "titleAsc") {
            const titleA = (
              a.series_season_cn ||
              a.series_en ||
              ""
            ).toLowerCase();
            const titleB = (
              b.series_season_cn ||
              b.series_en ||
              ""
            ).toLowerCase();
            return titleA.localeCompare(titleB);
          } else if (sortVal === "scoreDesc") {
            return (b.mal_rating || 0) - (a.mal_rating || 0);
          } else if (sortVal === "myRatingDesc") {
            // Custom rating mapping (S > A+ > A > B...)
            const scoreMap = {
              S: 10,
              "A+": 9,
              A: 8,
              B: 7,
              C: 6,
              D: 5,
              E: 4,
              F: 3,
            };
            const myA = scoreMap[a.rating_mine] || 0;
            const myB = scoreMap[b.rating_mine] || 0;
            return myB - myA;
          } else if (sortVal === "releaseDesc") {
            // Basic string compare for dates works if formatted consistently (e.g. YYYY-MM)
            const dateA = a.release_date || "0000";
            const dateB = b.release_date || "0000";
            return dateB.localeCompare(dateA);
          }
          return 0;
        });

        // 3. Render
        document.getElementById("resultCount").innerText =
          `${filtered.length} Items`;

        if (filtered.length === 0) {
          grid.classList.add("hidden");
          emptyState.classList.replace("hidden", "flex");
        } else {
          grid.classList.remove("hidden");
          emptyState.classList.replace("flex", "hidden");
          grid.innerHTML = filtered
            .map((anime) => createLibraryCard(anime))
            .join("");
        }
      }

      function createLibraryCard(anime) {
        const title =
          anime.series_season_cn ||
          anime.series_season_en ||
          anime.series_en ||
          "Unknown Title";
        const epFin = anime.ep_fin || 0;
        const epTotal = anime.ep_total || "?";

        // Color coding for status
        let statusColor = "bg-gray-800";
        if (anime.my_progress === "Active Watching")
          statusColor = "bg-green-600";
        if (
          anime.my_progress === "Completed" ||
          anime.my_progress === "Finished"
        )
          statusColor = "bg-brand";

        // Fallback Image
        const fallbackSvg = `data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100%' height='100%'><rect width='100%' height='100%' fill='%23E5E7EB'/><text x='50%' y='50%' font-family='Arial' font-size='12' fill='%236B7280' font-weight='bold' dominant-baseline='middle' text-anchor='middle'>No Image</text></svg>`;

        return `
            <div class="bg-white rounded-xl border border-gray-200 overflow-hidden card-hover shadow-sm flex flex-col h-full group">
                <!-- Cover Image Container -->
                <div class="relative w-full aspect-[3/4] bg-gray-100 cursor-pointer overflow-hidden" onclick="window.location.href='/anime/${anime.system_id}'">
                    <img src="${anime.cover_image_url || ""}" alt="Cover" class="w-full h-full object-cover transition duration-300 group-hover:scale-105" onerror="this.src='${fallbackSvg}'">
                    
                    <!-- Top Overlay Badges -->
                    <div class="absolute top-2 left-2 flex flex-col gap-1">
                        ${anime.mal_rating ? `<span class="bg-[#2e51a2]/90 backdrop-blur-sm text-white text-[10px] font-bold px-1.5 py-0.5 rounded shadow"><i class="fas fa-star text-yellow-400 mr-1"></i>${anime.mal_rating.toFixed(2)}</span>` : ""}
                        ${anime.rating_mine ? `<span class="bg-yellow-400/90 backdrop-blur-sm text-yellow-900 text-[10px] font-bold px-1.5 py-0.5 rounded shadow">My: ${anime.rating_mine}</span>` : ""}
                    </div>

                    <!-- Progress Bar Overlay (Bottom of Image) -->
                    <div class="absolute bottom-0 left-0 w-full h-1 bg-gray-900/50">
                        <div class="h-full ${statusColor}" style="width: ${anime.ep_total ? Math.round((epFin / anime.ep_total) * 100) : epFin > 0 ? 100 : 0}%"></div>
                    </div>
                </div>

                <!-- Card Content -->
                <div class="p-3 flex flex-col flex-1">
                    <h3 class="font-bold text-gray-900 text-sm line-clamp-2 leading-snug mb-1 cursor-pointer hover:text-brand" onclick="window.location.href='/anime/${anime.system_id}'" title="${title}">${title}</h3>
                    <p class="text-[11px] text-gray-500 font-medium mb-3">${anime.airing_type || "TV"} &bull; ${anime.release_date || "TBA"}</p>
                    
                    <!-- Progress Controls (Bottom) -->
                    <div class="mt-auto flex items-center justify-between">
                        <span class="text-xs font-bold text-gray-700 bg-gray-100 px-2 py-1 rounded">
                            <span id="card-ep-${anime.system_id}">${epFin}</span> / ${epTotal}
                        </span>
                        
                        <button onclick="optimisticLibraryUpdate('${anime.system_id}', 1)" class="w-7 h-7 rounded bg-brand/10 hover:bg-brand text-brand hover:text-white transition flex items-center justify-center" title="Add 1 Episode">
                            <i class="fas fa-plus text-[10px]"></i>
                        </button>
                    </div>
                </div>
            </div>
          `;
      }

      // --- Optimistic State Management ---
      async function optimisticLibraryUpdate(sys_id, change) {
        const index = allAnimeData.findIndex((a) => a.system_id === sys_id);
        if (index === -1) return;

        const anime = allAnimeData[index];
        const currentEps = anime.ep_fin || 0;
        let newEps = currentEps + change;

        if (newEps < 0) newEps = 0;
        if (anime.ep_total && newEps > anime.ep_total) newEps = anime.ep_total;
        if (newEps === currentEps) return; // No change

        // 1. Optimistic Update in DOM directly (faster than full re-render)
        allAnimeData[index].ep_fin = newEps;
        const countSpan = document.getElementById(`card-ep-${sys_id}`);
        if (countSpan) countSpan.innerText = newEps;

        // 2. Background API Request
        try {
          const res = await fetch(`${API_BASE_URL}/anime/${sys_id}/progress`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ ep_fin: newEps }),
          });

          if (!res.ok) throw new Error("Failed to sync");
        } catch (error) {
          // Revert
          allAnimeData[index].ep_fin = currentEps;
          if (countSpan) countSpan.innerText = currentEps;
          showToast("Network error. Progress reverted.", true);
        }
      }

      // --- Sync Orchestration ---
      async function handleSync() {
        const icon = document.getElementById("syncIcon");
        const btn = document.getElementById("syncBtn");

        icon.classList.add("fa-spin");
        btn.classList.add("opacity-75", "pointer-events-none");
        btn.innerText = " Syncing...";
        btn.prepend(icon);

        try {
          const response = await fetch(`${API_BASE_URL}/admin/sync`, {
            method: "POST",
          });
          if (response.ok) {
            icon.classList.remove("fa-spin", "fa-sync-alt");
            icon.classList.add("fa-check");
            btn.classList.remove(
              "bg-brand",
              "hover:bg-brand-hover",
              "opacity-75",
              "pointer-events-none",
            );
            btn.classList.add("bg-emerald-500", "hover:bg-emerald-600");
            btn.innerText = " Synced!";
            btn.prepend(icon);

            showToast("Successfully synchronized with Google Sheets!");
            await loadLibrary(); // Refresh data

            setTimeout(() => {
              icon.classList.remove("fa-check");
              icon.classList.add("fa-sync-alt");
              btn.classList.remove("bg-emerald-500", "hover:bg-emerald-600");
              btn.classList.add("bg-brand", "hover:bg-brand-hover");
              btn.innerText = " Sync";
              btn.prepend(icon);
            }, 2000);
          } else {
            throw new Error((await response.json()).detail);
          }
        } catch (error) {
          icon.classList.remove("fa-spin");
          btn.classList.remove("opacity-75", "pointer-events-none");
          btn.innerText = " Sync";
          btn.prepend(icon);

          showToast(`Sync Error: ${error.message}`, true);
        }
      }
    </script>
  </body>
</html>
