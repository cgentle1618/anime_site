services:
  db:
    image: postgres:15
    container_name: anime_site_postgres_db
    restart: always

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_anime_data:/var/lib/postgresql/data

  # --- Tailwind CSS Background Compiler ---
  tailwind-watcher:
    image: node:20-alpine
    container_name: anime_site_tailwind_watcher
    working_dir: /app

    # Mount your local code directory into the container
    volumes:
      - .:/app

    # Installs Tailwind (if node_modules is missing)
    # Runs the Tailwind CLI in "watch" mode
    command: sh -c "npm install && npx tailwindcss -i ./static/css/input.css -o ./static/css/main.css --watch"

volumes:
  postgres_anime_data:
