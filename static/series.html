<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Series Hub - CG1618</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Roboto", "Noto Sans TC", "sans-serif"] },
            colors: { brand: { DEFAULT: "#6366f1", hover: "#4f46e5" } },
          },
        },
      };
    </script>
    <style>
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f3f4f6;
      }
      ::-webkit-scrollbar-thumb {
        background: #d1d5db;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #9ca3af;
      }
      .card-hover {
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
        cursor: pointer;
      }
      .card-hover:hover {
        transform: translateY(-4px);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      }
      input[type="number"]::-webkit-inner-spin-button {
        -webkit-appearance: none;
      }
      select.rating-select {
        appearance: none;
        background-image: none;
        text-align-last: center;
      }
      select.rating-select::-ms-expand {
        display: none;
      }
    </style>
  </head>
  <body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col font-sans">
    <!-- Universal Top Navigation Bar -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
          <div class="flex items-center space-x-8">
            <a
              href="/"
              class="flex-shrink-0 font-bold text-2xl tracking-wider text-brand hover:opacity-80 transition cursor-pointer"
            >
              CG1618
            </a>
            <div class="hidden md:block">
              <div class="flex items-baseline space-x-4">
                <a
                  href="/"
                  class="text-gray-600 hover:text-gray-900 hover:bg-gray-100 px-3 py-2 rounded-md text-sm font-medium transition"
                  >Dashboard</a
                >
                <a
                  href="/library"
                  class="text-gray-600 hover:text-gray-900 hover:bg-gray-100 px-3 py-2 rounded-md text-sm font-medium transition"
                  >Library</a
                >

                <!-- Admin Dropdown -->
                <div class="relative group">
                  <button
                    class="text-gray-600 group-hover:text-gray-900 group-hover:bg-gray-100 px-3 py-2 rounded-md text-sm font-medium transition inline-flex items-center"
                  >
                    Admin <i class="fas fa-chevron-down ml-1.5 text-[10px]"></i>
                  </button>
                  <div
                    class="absolute left-0 top-full pt-1 w-32 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50"
                  >
                    <div
                      class="bg-white border border-gray-200 rounded-lg shadow-lg overflow-hidden flex flex-col"
                    >
                      <a
                        href="/system"
                        class="px-4 py-2.5 text-sm text-gray-700 hover:bg-brand/5 hover:text-brand font-medium transition border-b border-gray-100"
                        >Admin</a
                      >
                      <a
                        href="/add"
                        class="px-4 py-2.5 text-sm text-gray-700 hover:bg-brand/5 hover:text-brand font-medium transition"
                        >Add</a
                      >
                      <a
                        href="/modify"
                        class="px-4 py-2.5 text-sm text-gray-700 hover:bg-brand/5 hover:text-brand font-medium transition"
                        >Modify</a
                      >
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="flex items-center space-x-4 flex-1 justify-end">
            <div class="relative w-full max-w-md hidden sm:block">
              <div
                class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
              >
                <i class="fas fa-search text-gray-400"></i>
              </div>
              <input
                type="text"
                id="globalSearchInput"
                class="block w-full pl-10 pr-3 py-2 border border-gray-200 rounded-md leading-5 bg-white text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-brand focus:border-brand sm:text-sm transition"
                placeholder="Search Series, Season, Studio, Release..."
              />
            </div>
            <button
              onclick="handleSync()"
              id="syncBtn"
              class="bg-brand hover:bg-brand-hover text-white px-4 py-2 rounded-md text-sm font-medium flex items-center transition shadow-sm"
            >
              <i class="fas fa-sync-alt mr-2" id="syncIcon"></i> Sync Sheets
            </button>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
      <div id="loading" class="flex flex-col items-center justify-center h-64">
        <i class="fas fa-circle-notch fa-spin text-4xl text-brand mb-4"></i>
        <p class="text-gray-500 font-medium">Loading Franchise Database...</p>
      </div>

      <div id="main-content" class="hidden">
        <!-- Series Hero Card -->
        <div
          class="bg-white p-6 sm:p-8 rounded-2xl border border-gray-200 shadow-sm mb-10"
        >
          <div
            class="flex flex-col md:flex-row justify-between md:items-center gap-6"
          >
            <div class="flex-1 min-w-0">
              <span
                class="text-xs font-bold text-brand uppercase tracking-widest mb-2 block"
                >Franchise Hub</span
              >
              <h1
                class="text-3xl font-bold text-gray-900 mb-2 truncate"
                id="series-cn"
              ></h1>
              <p
                class="text-lg text-gray-500 font-medium truncate"
                id="series-en"
              ></p>

              <div
                class="flex flex-wrap items-center gap-3 mt-4 text-xs font-medium text-gray-600"
              >
                <span
                  class="bg-gray-50 px-2.5 py-1.5 rounded-lg border border-gray-200 shadow-sm flex items-center"
                >
                  <i class="fas fa-language mr-1.5 text-gray-400"></i>
                  <span id="series-roman"></span>
                </span>
                <span
                  class="bg-gray-50 px-2.5 py-1.5 rounded-lg border border-gray-200 shadow-sm flex items-center"
                >
                  <i class="fas fa-tags mr-1.5 text-gray-400"></i>
                  <span id="series-alt"></span>
                </span>
                <span
                  id="series-genres-container"
                  class="hidden bg-brand/5 px-2.5 py-1.5 rounded-lg border border-brand/20 text-brand shadow-sm items-center max-w-full"
                >
                  <i class="fas fa-shapes mr-1.5 opacity-70"></i>
                  <span
                    id="series-genres"
                    class="truncate font-semibold tracking-wide"
                  ></span>
                </span>
              </div>
            </div>

            <div class="flex flex-row gap-4 flex-shrink-0">
              <div
                class="text-center p-4 bg-blue-50 rounded-2xl border border-blue-100 min-w-[120px] flex flex-col justify-center shadow-sm"
              >
                <span
                  class="text-[10px] text-blue-600 font-bold uppercase block mb-1"
                  title="Average of Main Story (本傳)"
                  >MAL Avg</span
                >
                <span
                  id="series-mal-rating"
                  class="text-3xl font-black text-blue-700"
                  >-</span
                >
              </div>
              <div
                class="text-center p-4 bg-indigo-50 rounded-2xl border border-indigo-100 min-w-[120px] flex flex-col justify-center shadow-sm"
              >
                <label
                  for="series-rating"
                  class="text-[10px] text-brand font-bold uppercase block mb-1 cursor-pointer"
                  >My Rating</label
                >
                <select
                  id="series-rating"
                  class="rating-select w-full bg-transparent text-3xl font-black text-brand focus:outline-none cursor-pointer text-center"
                  onchange="syncSeriesRating(this.value)"
                >
                  <option value="null" class="text-xl">-</option>
                  <option value="S" class="text-xl">S</option>
                  <option value="A+" class="text-xl">A+</option>
                  <option value="A" class="text-xl">A</option>
                  <option value="B" class="text-xl">B</option>
                  <option value="C" class="text-xl">C</option>
                  <option value="D" class="text-xl">D</option>
                  <option value="E" class="text-xl">E</option>
                  <option value="F" class="text-xl">F</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <!-- Anime Entries Sections -->
        <div>
          <div id="seriesGrid" class="flex flex-col gap-6">
            <!-- Sections Injected via JS -->
          </div>
        </div>
      </div>
    </main>

    <!-- Scroll to Top Button -->
    <button
      id="scrollToTopBtn"
      onclick="scrollToTop()"
      class="fixed bottom-6 right-6 z-[60] bg-brand hover:bg-brand-hover text-white w-12 h-12 rounded-full shadow-xl flex items-center justify-center transition-all duration-300 opacity-0 translate-y-4 pointer-events-none"
    >
      <i class="fas fa-arrow-up"></i>
    </button>

    <footer class="bg-white border-t border-gray-200 mt-auto">
      <div
        class="max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8 flex justify-center text-sm text-gray-500"
      >
        &copy; 2026 CG1618 Anime Database. Version 0.0
      </div>
    </footer>

    <!-- Logic -->
    <script>
      const API_BASE_URL = "/api";
      const systemId = window.location.pathname.split("/").pop();
      let seriesData = null;
      let animeData = [];

      async function fetchSeriesDetails() {
        try {
          const seriesRes = await fetch(
            `${API_BASE_URL}/series/details/${systemId}`,
          );
          if (!seriesRes.ok) throw new Error("Failed to load series metadata");
          seriesData = await seriesRes.json();

          if (seriesData.series_en) {
            const animeRes = await fetch(
              `${API_BASE_URL}/anime/by-series/${encodeURIComponent(seriesData.series_en)}`,
            );
            if (animeRes.ok) {
              animeData = await animeRes.json();
            }
          }

          renderSeriesPage();
        } catch (error) {
          console.error(error);
          document.getElementById("loading").innerHTML = `
            <div class="w-full text-center text-red-600 py-8 bg-red-50 rounded-xl border border-red-200 max-w-md mx-auto">
                <i class="fas fa-exclamation-triangle mb-2 text-2xl"></i>
                <p class="font-bold">Error loading series data.</p>
                <p class="text-sm mt-1">${error.message}</p>
            </div>`;
        }
      }

      function renderSeriesPage() {
        document.getElementById("loading").classList.add("hidden");
        document.getElementById("main-content").classList.remove("hidden");

        // Populate Hero Card
        const mainTitle =
          seriesData.series_cn || seriesData.series_en || "Unknown Franchise";
        document.title = `${mainTitle} - CG1618 Hub`;

        document.getElementById("series-cn").innerText = mainTitle;
        document.getElementById("series-en").innerText =
          seriesData.series_en && seriesData.series_cn
            ? seriesData.series_en
            : "";
        document.getElementById("series-roman").innerText =
          seriesData.series_roman || "N/A";
        document.getElementById("series-alt").innerText =
          seriesData.alt_name || "N/A";
        document.getElementById("series-rating").value =
          seriesData.rating_series || "null";

        // Calculate and display MAL Average for "本傳" (Main Story)
        let totalMal = 0;
        let countMal = 0;
        animeData.forEach((anime) => {
          if (anime.main_spinoff === "本傳" && anime.mal_rating) {
            totalMal += anime.mal_rating;
            countMal++;
          }
        });
        const malAvg = countMal > 0 ? (totalMal / countMal).toFixed(2) : "N/A";
        document.getElementById("series-mal-rating").innerText = malAvg;

        // Extract and display all unique genres from the franchise's entries
        const genres = new Set();
        animeData.forEach((anime) => {
          if (anime.genre_main && anime.genre_main.trim() !== "")
            genres.add(anime.genre_main.trim());
          if (anime.genre_sub && anime.genre_sub.trim() !== "")
            genres.add(anime.genre_sub.trim());
        });

        const genreArray = Array.from(genres);
        const genreContainer = document.getElementById(
          "series-genres-container",
        );

        if (genreArray.length > 0) {
          document.getElementById("series-genres").innerText =
            genreArray.join(" / ");
          genreContainer.classList.remove("hidden");
          genreContainer.classList.add("flex");
        } else {
          genreContainer.classList.add("hidden");
          genreContainer.classList.remove("flex");
        }

        const grid = document.getElementById("seriesGrid");
        grid.innerHTML = "";

        if (animeData.length === 0) {
          grid.innerHTML = `<p class="text-gray-500 italic text-center py-8 border-2 border-dashed border-gray-200 rounded-xl">No specific seasons found for this franchise.</p>`;
          return;
        }

        // 1. Group Data into Categories
        const groups = {
          Watching: [],
          "Not Yet Aired": [],
          TV: [],
          ONA: [],
          Movie: [],
          Special: [],
          OVA: [],
          OAD: [],
          Other: [],
        };

        animeData.forEach((anime) => {
          if (
            anime.my_progress === "Active Watching" ||
            anime.my_progress === "Passive Watching"
          ) {
            groups["Watching"].push(anime);
          } else if (anime.airing_status === "Not Yet Aired") {
            groups["Not Yet Aired"].push(anime);
          } else {
            const type = anime.airing_type || "Other";
            if (groups[type] !== undefined) {
              groups[type].push(anime);
            } else {
              groups["Other"].push(anime);
            }
          }
        });

        // 2. Define Sorting Algorithm (Sort by parsed chronological date)
        const parseReleaseDate = (dateStr) => {
          if (!dateStr) return 999999;
          const str = String(dateStr).trim().toUpperCase();
          if (str === "TBA" || str === "") return 999999;

          const yearMatch = str.match(/\d{4}/);
          if (yearMatch) {
            const year = parseInt(yearMatch[0], 10);
            let month = 2; // Default to Feb

            if (str.includes("WIN")) month = 1;
            else if (str.includes("SPR")) month = 4;
            else if (str.includes("SUM")) month = 7;
            else if (str.includes("FAL")) month = 10;
            else if (str.includes("JAN")) month = 1;
            else if (str.includes("FEB")) month = 2;
            else if (str.includes("MAR")) month = 3;
            else if (str.includes("APR")) month = 4;
            else if (str.includes("MAY")) month = 5;
            else if (str.includes("JUN")) month = 6;
            else if (str.includes("JUL")) month = 7;
            else if (str.includes("AUG")) month = 8;
            else if (str.includes("SEP")) month = 9;
            else if (str.includes("OCT")) month = 10;
            else if (str.includes("NOV")) month = 11;
            else if (str.includes("DEC")) month = 12;

            return year * 100 + month;
          }
          return 999999;
        };

        const sortByReleaseDate = (a, b) => {
          let valA = parseReleaseDate(a.release_date);
          let valB = parseReleaseDate(b.release_date);
          if (valA !== valB) return valA - valB;

          // Tie-breaker: Strict English Alphabetical
          let titleA = String(a.series_season_en || a.series_en || "")
            .trim()
            .toLowerCase();
          let titleB = String(b.series_season_en || b.series_en || "")
            .trim()
            .toLowerCase();
          return titleA < titleB ? -1 : titleA > titleB ? 1 : 0;
        };

        // 3. Sort Each Group uniformly by release date
        groups["Watching"].sort(sortByReleaseDate);
        groups["Not Yet Aired"].sort(sortByReleaseDate);
        groups["TV"].sort(sortByReleaseDate);
        groups["ONA"].sort(sortByReleaseDate);
        groups["Movie"].sort(sortByReleaseDate);
        groups["Special"].sort(sortByReleaseDate);
        groups["OVA"].sort(sortByReleaseDate);
        groups["OAD"].sort(sortByReleaseDate);
        groups["Other"].sort(sortByReleaseDate);

        // 4. Render Sections (Order is strictly defined here)
        const renderSection = (title, entries, icon) => {
          if (entries.length === 0) return;

          let html = `
                <div class="mb-6 last:mb-0">
                    <div class="flex items-center mb-4 border-b border-gray-200 pb-2">
                        <h3 class="text-lg font-bold text-gray-800 uppercase tracking-wide"><i class="fas ${icon} text-brand mr-2 w-6 text-center"></i> ${title}</h3>
                        <span class="ml-3 bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full text-xs font-bold border border-gray-200">${entries.length}</span>
                    </div>
                    <div class="flex flex-col gap-3">
            `;
          entries.forEach((anime) => {
            html += createCardHTML(anime);
          });
          html += `</div></div>`;
          grid.innerHTML += html;
        };

        // Render in exact order required (Watching first!)
        renderSection("Watching", groups["Watching"], "fa-eye");
        renderSection(
          "Not Yet Aired",
          groups["Not Yet Aired"],
          "fa-calendar-plus",
        );
        renderSection("TV", groups["TV"], "fa-tv");
        renderSection("ONA", groups["ONA"], "fa-globe");
        renderSection("Movie", groups["Movie"], "fa-film");
        renderSection("Special", groups["Special"], "fa-star");
        renderSection("OVA", groups["OVA"], "fa-compact-disc");
        renderSection("OAD", groups["OAD"], "fa-compact-disc");
        renderSection("Other", groups["Other"], "fa-question-circle");
      }

      function createCardHTML(anime) {
        let rankColor = "bg-gray-100 text-gray-600 border-gray-300";

        if (anime.rating_mine === "S")
          rankColor = "bg-yellow-100 text-yellow-700 border border-yellow-300";
        else if (anime.rating_mine === "A+")
          rankColor = "bg-orange-100 text-orange-700 border border-orange-300";
        else if (anime.rating_mine === "A")
          rankColor = "bg-red-100 text-red-700 border border-red-300";
        else if (anime.rating_mine === "B")
          rankColor = "bg-blue-100 text-blue-700 border border-blue-300";
        else if (anime.rating_mine === "C")
          rankColor = "bg-green-100 text-green-700 border border-green-300";
        else if (anime.rating_mine === "D")
          rankColor = "bg-teal-100 text-teal-700 border border-teal-300";
        else if (anime.rating_mine === "E")
          rankColor = "bg-purple-100 text-purple-700 border border-purple-300";
        else if (anime.rating_mine === "F")
          rankColor = "bg-gray-200 text-gray-700 border border-gray-300";

        const totalEps = anime.ep_total ? anime.ep_total : "?";
        const progressPercent = anime.ep_total
          ? Math.round((anime.ep_fin / anime.ep_total) * 100)
          : 0;

        let mainTitle = anime.series_season_cn;
        let subTitle = anime.series_season_en || anime.series_en || "";
        if (!mainTitle) {
          mainTitle =
            anime.series_season_en || anime.series_en || "Unknown Title";
          subTitle = "";
        }

        const malRatingDisplay = anime.mal_rating
          ? anime.mal_rating.toFixed(2)
          : "N/A";
        const bahaStr = String(anime.source_baha || "").toUpperCase();
        const hasBaha =
          bahaStr === "TRUE" || bahaStr === "YES" || bahaStr === "有";
        const bahaBadge = hasBaha
          ? `<span class="bg-[#00B4D8] text-white px-1.5 py-0.5 rounded border border-[#0096C7] flex items-center shadow-sm text-[10px] font-bold whitespace-nowrap" title="巴哈姆特動畫瘋"><i class="fas fa-play-circle mr-1"></i>動畫瘋</span>`
          : "";

        // Map colors for "my_progress"
        const progressStatus = anime.my_progress || "Plan to Watch";
        let progressColor = "text-gray-700 bg-gray-100 border-gray-300";
        if (progressStatus === "Active Watching")
          progressColor = "text-green-700 bg-green-100 border-green-300";
        else if (progressStatus === "Passive Watching")
          progressColor = "text-blue-700 bg-blue-100 border-blue-300";
        else if (progressStatus === "Paused")
          progressColor = "text-orange-700 bg-orange-100 border-orange-300";
        else if (
          progressStatus === "Completed" ||
          progressStatus === "Finished"
        )
          progressColor = "text-purple-700 bg-purple-100 border-purple-300";
        else if (
          progressStatus === "Dropped" ||
          progressStatus === "Temp Dropped" ||
          progressStatus === "Won't Watch"
        )
          progressColor = "text-red-700 bg-red-100 border-red-300";
        else if (
          progressStatus === "Might Watch" ||
          progressStatus === "Watch When Airs" ||
          progressStatus === "Plan to Watch"
        )
          progressColor = "text-teal-700 bg-teal-100 border-teal-300";

        return `
                <div class="bg-white rounded-xl overflow-hidden border border-gray-200 flex flex-col sm:flex-row card-hover shadow-sm" onclick="window.location.href='/anime/${anime.system_id}'">
                    <div class="h-24 sm:h-auto sm:w-24 relative bg-gray-100 shrink-0 border-r border-gray-200 flex justify-center items-center">
                        <img src="${anime.cover_image_url || ""}" alt="${mainTitle}" class="w-full h-full object-cover" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'100%\\' height=\\'100%\\'><rect width=\\'100%\\' height=\\'100%\\' fill=\\'%23E5E7EB\\'/><text x=\\'50%\\' y=\\'50%\\' font-family=\\'Arial\\' font-size=\\'10\\' fill=\\'%236B7280\\' dominant-baseline=\\'middle\\' text-anchor=\\'middle\\'>No Image</text></svg>'">
                    </div>
                    <div class="p-3 flex-1 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                        <div class="flex-1 min-w-0 w-full">
                            <h2 class="text-base font-bold text-gray-900 line-clamp-1 mb-0.5" title="${mainTitle}">${mainTitle}</h2>
                            <h3 class="text-xs text-gray-500 line-clamp-1 mb-1.5 font-medium" title="${subTitle}">${subTitle}</h3>
                            <div class="flex items-center gap-2 mb-1.5 flex-wrap">
                                <span class="px-2 py-0.5 rounded shadow-sm text-xs font-bold whitespace-nowrap border ${progressColor}">
                                    ${progressStatus}
                                </span>
                                <span class="${rankColor} px-1.5 py-0.5 rounded shadow-sm text-[10px] font-bold whitespace-nowrap">
                                    Rating: ${anime.rating_mine || "-"}
                                </span>
                                <span class="bg-[#2e51a2] text-white px-1.5 py-0.5 rounded shadow-sm flex items-center text-[10px] font-bold whitespace-nowrap">
                                    <i class="fas fa-star text-yellow-400 mr-1 text-[8px]"></i> MAL: ${malRatingDisplay}
                                </span>
                            </div>
                            <div class="flex flex-wrap items-center gap-2 text-xs text-gray-600 mt-2">
                                <span class="bg-gray-100 px-1.5 py-0.5 rounded-md border border-gray-200 flex items-center shadow-sm text-[10px] whitespace-nowrap font-semibold">
                                    ${anime.main_spinoff || "-"}
                                </span>
                                <span class="bg-gray-100 px-1.5 py-0.5 rounded-md border border-gray-200 flex items-center shadow-sm text-[10px] whitespace-nowrap font-semibold">
                                    ${anime.airing_type || "-"}
                                </span>
                                <span class="text-[10px] ${anime.airing_status === "Currently Airing" ? "text-green-700 bg-green-100 border-green-200" : "text-blue-700 bg-blue-100 border-blue-200"} px-1.5 py-0.5 rounded border shadow-sm whitespace-nowrap">
                                    ${anime.airing_status || "-"}
                                </span>
                                <span class="bg-gray-100 px-1.5 py-0.5 rounded-md border border-gray-200 flex items-center shadow-sm text-[10px] whitespace-nowrap">
                                    <i class="fas fa-calendar-alt text-gray-400 mr-1"></i>
                                    ${anime.release_date || "TBA"}
                                </span>
                                <span class="bg-gray-100 px-1.5 py-0.5 rounded-md border border-gray-200 flex items-start shadow-sm text-[10px]">
                                    <i class="fas fa-building text-gray-400 mr-1 mt-0.5 shrink-0"></i>
                                    <span class="break-words">${anime.studio || "-"}</span>
                                </span>
                                ${bahaBadge}
                            </div>
                        </div>
                        <div class="w-full sm:w-56 bg-gray-50 p-2 rounded-xl border border-gray-200 shrink-0" onclick="event.stopPropagation()">
                            <div class="text-[10px] text-gray-500 mb-1 flex justify-between items-center">
                                <span>Episodes Watched</span>
                                <span class="font-bold text-gray-900">${progressPercent}%</span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-1 mb-2">
                                <div class="bg-brand h-1 rounded-full transition-all duration-300 shadow-sm" style="width: ${progressPercent}%"></div>
                            </div>
                            <div class="flex items-center justify-between bg-white rounded-lg p-1 border border-gray-200 shadow-sm">
                                <button onclick="updateProgress('${anime.system_id}', -1)" class="w-7 h-7 rounded-md hover:bg-gray-100 text-gray-500 hover:text-gray-900 transition flex items-center justify-center">
                                    <i class="fas fa-minus text-[10px]"></i>
                                </button>
                                <div class="font-mono font-bold text-sm tracking-wide flex items-baseline justify-center">
                                    <input type="number" value="${anime.ep_fin || 0}" onchange="setExactProgress('${anime.system_id}', this.value)" onclick="this.select()" class="w-10 text-center text-gray-900 bg-transparent border-b-2 border-transparent hover:border-gray-300 focus:border-brand focus:outline-none transition-colors appearance-none p-0" />
                                    <span class="text-gray-400 mx-0.5 text-xs">/</span>
                                    <span class="text-gray-500 text-xs">${totalEps}</span>
                                </div>
                                <button onclick="updateProgress('${anime.system_id}', 1)" class="w-7 h-7 rounded-md bg-brand/10 hover:bg-brand text-brand hover:text-white transition flex items-center justify-center">
                                    <i class="fas fa-plus text-[10px]"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
      }

      function updateProgress(sys_id, change) {
        const index = animeData.findIndex((a) => a.system_id === sys_id);
        if (index === -1) return;
        let current = animeData[index].ep_fin || 0;
        setExactProgress(sys_id, current + change);
      }

      async function setExactProgress(sys_id, newValue) {
        const index = animeData.findIndex((a) => a.system_id === sys_id);
        if (index === -1) return;

        let parsedValue = parseInt(newValue, 10);
        if (isNaN(parsedValue)) parsedValue = 0;

        let total = animeData[index].ep_total;
        if (parsedValue < 0) parsedValue = 0;
        if (total && parsedValue > total) parsedValue = total;

        const current = animeData[index].ep_fin || 0;
        if (parsedValue === current) {
          renderSeriesPage();
          return;
        }

        animeData[index].ep_fin = parsedValue;
        renderSeriesPage();

        try {
          const response = await fetch(
            `${API_BASE_URL}/anime/${sys_id}/progress`,
            {
              method: "PATCH",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ ep_fin: parsedValue }),
            },
          );
          if (!response.ok) throw new Error("Failed to update on server");
        } catch (error) {
          console.error(error);
          animeData[index].ep_fin = current;
          renderSeriesPage();
        }
      }

      async function syncSeriesRating(val) {
        const payloadVal = val === "null" ? "null" : val;
        try {
          const res = await fetch(`${API_BASE_URL}/series/${systemId}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ rating_series: payloadVal }),
          });
          if (res.ok) {
            seriesData.rating_series =
              payloadVal === "null" ? null : payloadVal;
          } else {
            alert("Failed to update overall series rating.");
          }
        } catch (e) {
          console.error(e);
        }
      }

      async function handleSync() {
        const icon = document.getElementById("syncIcon");
        const btn = document.getElementById("syncBtn");
        icon.classList.add("fa-spin");
        btn.classList.add("opacity-75");
        btn.innerText = " Syncing...";
        btn.prepend(icon);

        try {
          const response = await fetch(`${API_BASE_URL}/sync`, {
            method: "POST",
          });
          if (response.ok) {
            await fetchSeriesDetails();
          } else {
            const result = await response.json();
            alert(`Sync Error: ${result.detail}`);
          }
        } catch (error) {
          alert("Failed to connect to backend sync.");
        } finally {
          icon.classList.remove("fa-spin");
          btn.classList.remove("opacity-75");
          btn.innerText = " Sync Sheets";
          btn.prepend(icon);
        }
      }

      window.addEventListener("scroll", () => {
        const btn = document.getElementById("scrollToTopBtn");
        if (window.scrollY > 300) {
          btn.classList.remove(
            "opacity-0",
            "translate-y-4",
            "pointer-events-none",
          );
          btn.classList.add(
            "opacity-100",
            "translate-y-0",
            "pointer-events-auto",
          );
        } else {
          btn.classList.add(
            "opacity-0",
            "translate-y-4",
            "pointer-events-none",
          );
          btn.classList.remove(
            "opacity-100",
            "translate-y-0",
            "pointer-events-auto",
          );
        }
      });

      function scrollToTop() {
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      // Listen for Enter key to trigger Global Search Redirection
      const globalSearchInput = document.getElementById("globalSearchInput");
      if (globalSearchInput) {
        globalSearchInput.addEventListener("keypress", function (e) {
          if (e.key === "Enter") {
            const query = e.target.value.trim();
            if (query) {
              window.location.href = `/search?q=${encodeURIComponent(query)}`;
            }
          }
        });
      }

      document.addEventListener("DOMContentLoaded", fetchSeriesDetails);
    </script>
  </body>
</html>
