<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - CG1618 Tracker</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Roboto", "Noto Sans TC", "sans-serif"] },
            colors: { brand: { DEFAULT: "#6366f1", hover: "#4f46e5" } },
          },
        },
      };
    </script>
    <style>
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f3f4f6;
      }
      ::-webkit-scrollbar-thumb {
        background: #d1d5db;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #9ca3af;
      }
      .card-hover {
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }
      .card-hover:hover {
        transform: translateY(-4px);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      }
      input[type="number"]::-webkit-inner-spin-button {
        -webkit-appearance: none;
      }
      .search-dropdown {
        max-height: 400px;
        overflow-y: auto;
      }
    </style>
  </head>
  <body
    class="bg-gray-50 text-gray-900 min-h-screen flex flex-col font-sans relative"
  >
    <!-- Universal Top Navigation Bar -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
          <div class="flex items-center space-x-8">
            <a
              href="/"
              class="flex-shrink-0 font-bold text-2xl tracking-wider text-brand"
              >CG1618</a
            >
            <div class="hidden md:block">
              <div class="flex items-baseline space-x-4">
                <a
                  href="/"
                  class="bg-gray-100 text-gray-900 px-3 py-2 rounded-md text-sm font-medium transition"
                  >Dashboard</a
                >
                <a
                  href="/library"
                  class="text-gray-600 hover:text-gray-900 hover:bg-gray-100 px-3 py-2 rounded-md text-sm font-medium transition"
                  >Library</a
                >

                <!-- Admin Dropdown -->
                <div class="relative group">
                  <button
                    class="text-gray-600 group-hover:text-gray-900 group-hover:bg-gray-100 px-3 py-2 rounded-md text-sm font-medium transition inline-flex items-center"
                  >
                    Admin <i class="fas fa-chevron-down ml-1.5 text-[10px]"></i>
                  </button>
                  <div
                    class="absolute left-0 top-full pt-1 w-32 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50"
                  >
                    <div
                      class="bg-white border border-gray-200 rounded-lg shadow-lg overflow-hidden flex flex-col"
                    >
                      <a
                        href="/system"
                        class="px-4 py-2.5 text-sm text-gray-700 hover:bg-brand/5 hover:text-brand font-medium transition border-b border-gray-100"
                        >Admin</a
                      >
                      <a
                        href="/add"
                        class="px-4 py-2.5 text-sm text-gray-700 hover:bg-brand/5 hover:text-brand font-medium transition border-b border-gray-100"
                        >Add</a
                      >
                      <a
                        href="/modify"
                        class="px-4 py-2.5 text-sm text-gray-700 hover:bg-brand/5 hover:text-brand font-medium transition border-b border-gray-100"
                        >Modify</a
                      >
                      <a
                        href="/delete"
                        class="px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 hover:text-red-700 font-medium transition"
                        >Delete</a
                      >
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="flex items-center space-x-4 flex-1 justify-end">
            <!-- Global Search Bar with Suggestions -->
            <div
              class="relative w-full max-w-md hidden sm:block"
              id="globalSearchContainer"
            >
              <div
                class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
              >
                <i class="fas fa-search text-gray-400"></i>
              </div>
              <input
                type="text"
                id="globalSearchInput"
                oninput="handleGlobalSearch(this.value)"
                class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md leading-5 bg-white text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-brand focus:border-brand sm:text-sm transition"
                placeholder="Search Series or Anime Names..."
                autocomplete="off"
              />

              <!-- Suggestions Dropdown -->
              <div
                id="searchSuggestions"
                class="absolute left-0 right-0 top-full mt-1 bg-white border border-gray-200 rounded-md shadow-xl z-[100] hidden search-dropdown"
              >
                <!-- JS Injected Suggestions -->
              </div>
            </div>
            <button
              onclick="handleSync()"
              id="syncBtn"
              class="bg-brand hover:bg-brand-hover text-white px-4 py-2 rounded-md text-sm font-medium flex items-center transition shadow-sm"
            >
              <i class="fas fa-sync-alt mr-2" id="syncIcon"></i> Sync
            </button>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
      <!-- Hero / Welcome Section -->
      <div class="mb-10">
        <h1 class="text-3xl font-bold text-gray-900 mb-2">Welcome Back</h1>
        <p class="text-gray-500" id="dashboard-subtitle">
          Loading your active tracking data...
        </p>
      </div>

      <!-- Loading State -->
      <div id="loading" class="flex flex-col items-center justify-center h-48">
        <i class="fas fa-circle-notch fa-spin text-4xl text-brand mb-4"></i>
        <p class="text-gray-500 font-medium">Fetching dashboard...</p>
      </div>

      <!-- Dashboard Grid -->
      <div id="dashboard-content" class="hidden space-y-12">
        <!-- Active Watching Section -->
        <section>
          <div
            class="flex items-center mb-6 border-b border-gray-200 pb-3 pt-4 sticky top-16 z-40 bg-gray-50/95 backdrop-blur-md"
          >
            <h2 class="text-xl font-bold text-gray-900">
              <i class="fas fa-play-circle text-green-500 mr-2"></i> Active
              Watching
            </h2>
            <span
              id="count-active"
              class="ml-3 bg-green-100 text-green-700 px-2.5 py-0.5 rounded-full text-xs font-bold border border-green-200"
              >0</span
            >
          </div>
          <div
            id="grid-active"
            class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6"
          ></div>
        </section>

        <!-- Passive Watching Section -->
        <section>
          <div
            class="flex items-center mb-6 border-b border-gray-200 pb-3 pt-4 sticky top-16 z-40 bg-gray-50/95 backdrop-blur-md"
          >
            <h2 class="text-xl font-bold text-gray-900">
              <i class="fas fa-coffee text-blue-500 mr-2"></i> Passive Watching
            </h2>
            <span
              id="count-passive"
              class="ml-3 bg-blue-100 text-blue-700 px-2.5 py-0.5 rounded-full text-xs font-bold border border-blue-200"
              >0</span
            >
          </div>
          <div
            id="grid-passive"
            class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6"
          ></div>
        </section>

        <!-- Paused Section -->
        <section>
          <div
            class="flex items-center mb-6 border-b border-gray-200 pb-3 pt-4 sticky top-16 z-40 bg-gray-50/95 backdrop-blur-md"
          >
            <h2 class="text-xl font-bold text-gray-900">
              <i class="fas fa-pause-circle text-orange-500 mr-2"></i> Paused
            </h2>
            <span
              id="count-paused"
              class="ml-3 bg-orange-100 text-orange-700 px-2.5 py-0.5 rounded-full text-xs font-bold border border-orange-200"
              >0</span
            >
          </div>
          <div
            id="grid-paused"
            class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6"
          ></div>
        </section>

        <!-- Temp Dropped Section -->
        <section>
          <div
            class="flex items-center mb-6 border-b border-gray-200 pb-3 pt-4 sticky top-16 z-40 bg-gray-50/95 backdrop-blur-md"
          >
            <h2 class="text-xl font-bold text-gray-900">
              <i class="fas fa-stop-circle text-red-500 mr-2"></i> Temp Dropped
            </h2>
            <span
              id="count-dropped"
              class="ml-3 bg-red-100 text-red-700 px-2.5 py-0.5 rounded-full text-xs font-bold border border-red-200"
              >0</span
            >
          </div>
          <div
            id="grid-dropped"
            class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6"
          ></div>
        </section>
      </div>
    </main>

    <footer class="bg-white border-t border-gray-200 mt-auto relative z-10">
      <div
        class="max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8 flex justify-center text-sm text-gray-500"
      >
        &copy; 2026 CG1618 Anime Database. Dashboard View.
      </div>
    </footer>

    <!-- Scroll to Top Button -->
    <button
      id="scrollToTopBtn"
      onclick="scrollToTop()"
      class="fixed bottom-20 right-6 z-[60] bg-brand hover:bg-brand-hover text-white w-12 h-12 rounded-full shadow-xl flex items-center justify-center transition-all duration-300 opacity-0 translate-y-4 pointer-events-none"
    >
      <i class="fas fa-arrow-up"></i>
    </button>

    <!-- Global Toast Notification -->
    <div
      id="toast"
      class="fixed bottom-6 right-6 z-[100] transform transition-all duration-300 translate-y-20 opacity-0 bg-gray-900 text-white px-6 py-3 rounded-lg shadow-2xl flex items-center pointer-events-none"
    >
      <i id="toast-icon" class="fas fa-info-circle mr-3 text-lg"></i>
      <span id="toast-msg" class="font-medium text-sm"></span>
    </div>

    <!-- Logic -->
    <script>
      const API_BASE_URL = "/api";
      let allAnimeData = [];
      let allSeriesData = [];

      // --- Universal UI Features ---
      const searchInput = document.getElementById("globalSearchInput");
      searchInput.addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
          const query = e.target.value.trim();
          if (query)
            window.location.href = `/search?q=${encodeURIComponent(query)}`;
        }
      });

      document.addEventListener("click", function (e) {
        const container = document.getElementById("globalSearchContainer");
        const suggestions = document.getElementById("searchSuggestions");
        if (container && !container.contains(e.target)) {
          suggestions.classList.add("hidden");
        }
      });

      function showToast(message, isError = false) {
        const toast = document.getElementById("toast");
        const msg = document.getElementById("toast-msg");
        const icon = document.getElementById("toast-icon");

        msg.innerText = message;
        if (isError) {
          icon.className =
            "fas fa-exclamation-circle mr-3 text-red-400 text-lg";
          toast.classList.replace("bg-gray-900", "bg-red-900");
        } else {
          icon.className = "fas fa-check-circle mr-3 text-emerald-400 text-lg";
          toast.classList.replace("bg-red-900", "bg-gray-900");
        }

        toast.classList.remove("translate-y-20", "opacity-0");
        setTimeout(
          () => toast.classList.add("translate-y-20", "opacity-0"),
          3000,
        );
      }

      // --- Scroll to Top Engine ---
      window.addEventListener("scroll", () => {
        const btn = document.getElementById("scrollToTopBtn");
        if (window.scrollY > 300) {
          btn.classList.remove(
            "opacity-0",
            "translate-y-4",
            "pointer-events-none",
          );
          btn.classList.add(
            "opacity-100",
            "translate-y-0",
            "pointer-events-auto",
          );
        } else {
          btn.classList.add(
            "opacity-0",
            "translate-y-4",
            "pointer-events-none",
          );
          btn.classList.remove(
            "opacity-100",
            "translate-y-0",
            "pointer-events-auto",
          );
        }
      });

      function scrollToTop() {
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      // --- Search Suggestions Logic ---
      function normalize(str) {
        if (!str) return "";
        return String(str)
          .toLowerCase()
          .replace(/[^\p{L}\p{N}]/gu, "");
      }

      function handleGlobalSearch(query) {
        const suggestionsDiv = document.getElementById("searchSuggestions");
        if (!query || query.trim().length < 1) {
          suggestionsDiv.classList.add("hidden");
          return;
        }

        const qNorm = normalize(query);
        const seriesResults = [];
        const animeResults = [];

        // 1. Search Series
        allSeriesData.forEach((s) => {
          const matchText = [
            s.series_en,
            s.series_cn,
            s.alt_name,
            s.series_roman,
          ]
            .filter(Boolean)
            .join(" ");
          if (normalize(matchText).includes(qNorm)) {
            seriesResults.push({ type: "series", data: s });
          }
        });

        // 2. Search Anime
        allAnimeData.forEach((a) => {
          const matchText = [
            a.series_season_cn,
            a.series_season_en,
            a.series_en,
            a.series_season_roman,
          ]
            .filter(Boolean)
            .join(" ");
          if (normalize(matchText).includes(qNorm)) {
            animeResults.push({ type: "anime", data: a });
          }
        });

        // Priority: Series Hubs first, then Anime entries
        const results = [...seriesResults, ...animeResults];
        const limitedResults = results.slice(0, 10);

        if (limitedResults.length === 0) {
          suggestionsDiv.classList.add("hidden");
          return;
        }

        suggestionsDiv.innerHTML = limitedResults
          .map((res) => {
            if (res.type === "anime") {
              const a = res.data;
              // Look up the parent series in allSeriesData to get series_cn
              const parentSeries = allSeriesData.find(
                (s) => s.series_en === a.series_en,
              );
              const seriesDisplayName = parentSeries
                ? parentSeries.series_cn || parentSeries.series_en
                : a.series_en;

              return `
                    <div class="px-4 py-3 hover:bg-gray-50 cursor-pointer border-b border-gray-100 last:border-0 transition-colors" 
                         onclick="window.location.href='/anime/${a.system_id}'">
                        <div class="flex items-center justify-between mb-1">
                            <span class="text-[9px] font-bold uppercase tracking-wider text-brand bg-brand/5 px-1.5 py-0.5 rounded">Anime Entry</span>
                            <span class="text-[10px] text-gray-400 font-bold uppercase">${a.airing_type || "TV"}</span>
                        </div>
                        <div class="text-sm font-bold text-gray-900 truncate">${a.series_season_cn || a.series_season_en || a.series_en}</div>
                        <div class="text-[11px] text-gray-500 truncate mt-0.5 italic">From series: ${seriesDisplayName}</div>
                    </div>
                  `;
            } else {
              const s = res.data;
              return `
                    <div class="px-4 py-3 hover:bg-gray-50 cursor-pointer border-b border-gray-100 last:border-0 transition-colors" 
                         onclick="window.location.href='/series/${s.system_id}'">
                        <div class="flex items-center mb-1">
                            <span class="text-[9px] font-bold uppercase tracking-wider text-purple-600 bg-purple-50 px-1.5 py-0.5 rounded">Series Hub</span>
                        </div>
                        <div class="text-sm font-bold text-gray-900 truncate">${s.series_en}</div>
                        <div class="text-[11px] text-gray-500 truncate mt-0.5">${s.series_cn || ""} ${s.alt_name ? `(${s.alt_name})` : ""}</div>
                    </div>
                  `;
            }
          })
          .join("");

        suggestionsDiv.classList.remove("hidden");
      }

      async function loadSearchData() {
        try {
          const [animeRes, seriesRes] = await Promise.all([
            fetch(`${API_BASE_URL}/anime`),
            fetch(`${API_BASE_URL}/series`),
          ]);
          if (animeRes.ok) allAnimeData = await animeRes.json();
          if (seriesRes.ok) allSeriesData = await seriesRes.json();
        } catch (e) {
          console.error("Failed to load background search data.", e);
        }
      }

      // --- Data Fetching & Organization ---
      async function loadDashboard() {
        try {
          const [animeRes, seriesRes] = await Promise.all([
            fetch(`${API_BASE_URL}/anime`),
            fetch(`${API_BASE_URL}/series`),
          ]);

          if (!animeRes.ok || !seriesRes.ok)
            throw new Error("Failed to load tracking data");

          allAnimeData = await animeRes.json();
          allSeriesData = await seriesRes.json();

          renderDashboard();

          document.getElementById("loading").classList.add("hidden");
          document
            .getElementById("dashboard-content")
            .classList.remove("hidden");
        } catch (error) {
          document.getElementById("loading").innerHTML = `
                <div class="text-center text-red-600 bg-red-50 p-6 rounded-xl border border-red-200">
                    <i class="fas fa-exclamation-triangle mb-2 text-2xl"></i>
                    <p class="font-bold">Error loading dashboard data.</p>
                    <p class="text-sm mt-1">${error.message}</p>
                </div>`;
        }
      }

      function renderDashboard() {
        const active = [];
        const passive = [];
        const paused = [];
        const tempDropped = [];

        const sortedData = [...allAnimeData].sort((a, b) => {
          const titleA = (
            a.series_season_cn ||
            a.series_en ||
            ""
          ).toLowerCase();
          const titleB = (
            b.series_season_cn ||
            b.series_en ||
            ""
          ).toLowerCase();
          return titleA.localeCompare(titleB);
        });

        sortedData.forEach((anime) => {
          if (anime.my_progress === "Active Watching") active.push(anime);
          else if (anime.my_progress === "Passive Watching")
            passive.push(anime);
          else if (anime.my_progress === "Paused") paused.push(anime);
          else if (anime.my_progress === "Temp Dropped")
            tempDropped.push(anime);
        });

        const totalActive = active.length + passive.length;
        document.getElementById("dashboard-subtitle").innerText =
          `You are currently tracking ${totalActive} ongoing series.`;

        populateGrid("grid-active", "count-active", active);
        populateGrid("grid-passive", "count-passive", passive);
        populateGrid("grid-paused", "count-paused", paused);
        populateGrid("grid-dropped", "count-dropped", tempDropped);
      }

      function populateGrid(gridId, countId, dataArray) {
        const grid = document.getElementById(gridId);
        document.getElementById(countId).innerText = dataArray.length;

        if (dataArray.length === 0) {
          grid.innerHTML = `
                <div class="col-span-full flex flex-col items-center justify-center py-8 px-4 bg-white/50 rounded-xl border border-gray-200 border-dashed">
                    <p class="text-gray-400 font-medium italic"><i class="fas fa-ghost mr-2"></i> Nothing in this category right now.</p>
                </div>`;
          return;
        }

        grid.innerHTML = dataArray
          .map((anime) => createDashboardCard(anime))
          .join("");
      }

      function createDashboardCard(anime) {
        const title =
          anime.series_season_cn ||
          anime.series_season_en ||
          anime.series_en ||
          "Unknown Title";
        const subTitle = anime.series_en || "";

        const epFin = anime.ep_fin || 0;
        const epTotal = anime.ep_total || "?";

        let progressPercent = 0;
        let progressStyle = `width: 0%`;

        if (anime.ep_total) {
          progressPercent = Math.round((epFin / anime.ep_total) * 100);
          progressStyle = `width: ${progressPercent}%`;
        } else if (epFin > 0) {
          progressPercent = "Ongoing";
          progressStyle = `width: 100%; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;`;
        }

        let statusBadge = "";
        if (anime.my_progress === "Active Watching")
          statusBadge = `<span class="bg-green-100 text-green-700 px-2 py-0.5 rounded text-[10px] font-bold border border-green-200 shadow-sm">${anime.my_progress}</span>`;
        else if (anime.my_progress === "Passive Watching")
          statusBadge = `<span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-[10px] font-bold border border-blue-200 shadow-sm">${anime.my_progress}</span>`;
        else if (anime.my_progress === "Temp Dropped")
          statusBadge = `<span class="bg-red-100 text-red-700 px-2 py-0.5 rounded text-[10px] font-bold border border-red-200 shadow-sm">${anime.my_progress}</span>`;
        else
          statusBadge = `<span class="bg-orange-100 text-orange-700 px-2 py-0.5 rounded text-[10px] font-bold border border-orange-200 shadow-sm">${anime.my_progress}</span>`;

        const hasBaha =
          String(anime.source_baha || "").toUpperCase() === "TRUE" ||
          String(anime.source_baha || "").toUpperCase() === "YES" ||
          String(anime.source_baha || "") === "有";
        const bahaIcon = hasBaha
          ? `<span class="text-[#00B4D8] ml-2" title="Available on Bahamut"><i class="fas fa-play-circle"></i></span>`
          : "";

        const fallbackSvg = `data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100%' height='100%'><rect width='100%' height='100%' fill='%23E5E7EB'/><text x='50%' y='50%' font-family='Arial' font-size='12' fill='%236B7280' font-weight='bold' dominant-baseline='middle' text-anchor='middle'>No Image</text></svg>`;

        return `
            <div class="bg-white rounded-xl border border-gray-200 overflow-hidden card-hover shadow-sm flex flex-col h-full">
                <div class="flex p-3 cursor-pointer" onclick="window.location.href='/anime/${anime.system_id}'">
                    <div class="w-20 h-28 shrink-0 bg-gray-100 rounded-lg overflow-hidden border border-gray-200">
                        <img src="${anime.cover_image_url || ""}" alt="Cover" class="w-full h-full object-cover" onerror="this.src='${fallbackSvg}'">
                    </div>
                    <div class="ml-4 flex-1 min-w-0 flex flex-col justify-center">
                        <h3 class="font-bold text-gray-900 text-sm line-clamp-2 leading-tight mb-1" title="${title}">${title}</h3>
                        <p class="text-xs text-gray-500 truncate mb-2" title="${subTitle}">${subTitle}</p>
                        <div class="flex items-center flex-wrap gap-1.5 mt-auto">
                            ${statusBadge}
                            <span class="bg-gray-100 text-gray-600 px-2 py-0.5 rounded text-[10px] font-bold border border-gray-200 shadow-sm"><i class="fas fa-tv mr-1"></i>${anime.airing_type || "TV"}</span>
                            ${bahaIcon}
                        </div>
                    </div>
                </div>

                <div class="bg-gray-50 p-3 border-t border-gray-100 mt-auto">
                    <div class="flex justify-between items-end mb-1.5">
                        <span class="text-[10px] font-bold text-gray-500 uppercase tracking-wider">Progress</span>
                        <span class="text-[10px] font-bold text-brand">${progressPercent}${anime.ep_total ? "%" : ""}</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-1.5 mb-3 overflow-hidden">
                        <div class="bg-brand h-1.5 rounded-full transition-all duration-500" style="${progressStyle}"></div>
                    </div>
                    
                    <div class="flex items-center justify-between bg-white rounded-lg p-1.5 border border-gray-200 shadow-sm">
                        <button onclick="optimisticUpdate('${anime.system_id}', -1)" class="w-8 h-8 rounded-md hover:bg-gray-100 text-gray-500 hover:text-gray-900 transition flex items-center justify-center">
                            <i class="fas fa-minus text-xs"></i>
                        </button>
                        <div class="font-mono font-bold text-base tracking-wide flex items-baseline justify-center select-none">
                            <span class="text-gray-900 w-8 text-center">${epFin}</span>
                            <span class="text-gray-400 mx-1 text-sm">/</span>
                            <span class="text-gray-500 text-sm w-8 text-center">${epTotal}</span>
                        </div>
                        <button onclick="optimisticUpdate('${anime.system_id}', 1)" class="w-8 h-8 rounded-md bg-brand/10 hover:bg-brand text-brand hover:text-white transition flex items-center justify-center">
                            <i class="fas fa-plus text-xs"></i>
                        </button>
                    </div>
                </div>
            </div>
          `;
      }

      async function optimisticUpdate(sys_id, change) {
        const index = allAnimeData.findIndex((a) => a.system_id === sys_id);
        if (index === -1) return;

        const anime = allAnimeData[index];
        const currentEps = anime.ep_fin || 0;
        let newEps = currentEps + change;

        if (newEps < 0) newEps = 0;
        if (anime.ep_total && newEps > anime.ep_total) newEps = anime.ep_total;

        if (newEps === currentEps) return;

        allAnimeData[index].ep_fin = newEps;
        renderDashboard();

        try {
          const res = await fetch(`${API_BASE_URL}/anime/${sys_id}/progress`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ ep_fin: newEps }),
          });

          if (!res.ok)
            throw new Error(
              (await res.json()).detail || "Failed to sync to database",
            );
        } catch (error) {
          console.error("Optimistic Update Failed:", error);
          allAnimeData[index].ep_fin = currentEps;
          renderDashboard();
          showToast("Network error. Progress reverted.", true);
        }
      }

      async function handleSync() {
        const icon = document.getElementById("syncIcon");
        const btn = document.getElementById("syncBtn");

        icon.classList.add("fa-spin");
        btn.classList.add("opacity-75", "pointer-events-none");
        btn.innerText = " Syncing...";
        btn.prepend(icon);

        try {
          const response = await fetch(`${API_BASE_URL}/admin/sync`, {
            method: "POST",
          });
          if (response.ok) {
            icon.classList.remove("fa-spin", "fa-sync-alt");
            icon.classList.add("fa-check");
            btn.classList.remove(
              "bg-brand",
              "hover:bg-brand-hover",
              "opacity-75",
              "pointer-events-none",
            );
            btn.classList.add("bg-emerald-500", "hover:bg-emerald-600");
            btn.innerText = " Synced!";
            btn.prepend(icon);

            showToast("Successfully synchronized with Google Sheets!");
            await loadDashboard();

            setTimeout(() => {
              icon.classList.remove("fa-check");
              icon.classList.add("fa-sync-alt");
              btn.classList.remove("bg-emerald-500", "hover:bg-emerald-600");
              btn.classList.add("bg-brand", "hover:bg-brand-hover");
              btn.innerText = " Sync";
              btn.prepend(icon);
            }, 2000);
          } else {
            throw new Error((await response.json()).detail);
          }
        } catch (error) {
          icon.classList.remove("fa-spin");
          btn.classList.remove("opacity-75", "pointer-events-none");
          btn.innerText = " Sync";
          btn.prepend(icon);

          showToast(`Sync Error: ${error.message}`, true);
        }
      }

      document.addEventListener("DOMContentLoaded", loadDashboard);
    </script>
    <style>
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
    </style>
  </body>
</html>
