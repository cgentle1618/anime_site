<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Results - CG1618</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Roboto", "Noto Sans TC", "sans-serif"] },
            colors: { brand: { DEFAULT: "#6366f1", hover: "#4f46e5" } },
          },
        },
      };
    </script>
    <style>
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f3f4f6;
      }
      ::-webkit-scrollbar-thumb {
        background: #d1d5db;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #9ca3af;
      }
      .card-hover {
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
        cursor: pointer;
      }
      .card-hover:hover {
        transform: translateY(-4px);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      }
      .line-clamp-2 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
    </style>
  </head>
  <body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col font-sans">
    <!-- Universal Top Navigation Bar -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
          <div class="flex items-center space-x-8">
            <a
              href="/"
              class="flex-shrink-0 font-bold text-2xl tracking-wider text-brand"
              >CG1618</a
            >
            <div class="hidden md:block">
              <div class="flex items-baseline space-x-4">
                <a
                  href="/"
                  class="text-gray-600 hover:text-gray-900 hover:bg-gray-100 px-3 py-2 rounded-md text-sm font-medium transition"
                  >Dashboard</a
                >
                <a
                  href="/library"
                  class="text-gray-600 hover:text-gray-900 hover:bg-gray-100 px-3 py-2 rounded-md text-sm font-medium transition"
                  >Library</a
                >

                <!-- Admin Dropdown -->
                <div class="relative group">
                  <button
                    class="text-gray-600 group-hover:text-gray-900 group-hover:bg-gray-100 px-3 py-2 rounded-md text-sm font-medium transition inline-flex items-center"
                  >
                    Admin <i class="fas fa-chevron-down ml-1.5 text-[10px]"></i>
                  </button>
                  <div
                    class="absolute left-0 top-full pt-1 w-32 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50"
                  >
                    <div
                      class="bg-white border border-gray-200 rounded-lg shadow-lg overflow-hidden flex flex-col"
                    >
                      <a
                        href="/system"
                        class="px-4 py-2.5 text-sm text-gray-700 hover:bg-brand/5 hover:text-brand font-medium transition border-b border-gray-100"
                        >Admin</a
                      >
                      <a
                        href="/add"
                        class="px-4 py-2.5 text-sm text-gray-700 hover:bg-brand/5 hover:text-brand font-medium transition"
                        >Add</a
                      >
                      <a
                        href="/modify"
                        class="px-4 py-2.5 text-sm text-gray-700 hover:bg-brand/5 hover:text-brand font-medium transition"
                        >Modify</a
                      >
                      <a
                        href="/delete"
                        class="px-4 py-2.5 text-sm text-red-600 bg-red-50 font-medium transition"
                        >Delete</a
                      >
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="flex items-center space-x-4 flex-1 justify-end">
            <!-- Universal Search Bar -->
            <div class="relative w-full max-w-md hidden sm:block">
              <div
                class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
              >
                <i class="fas fa-search text-gray-400"></i>
              </div>
              <input
                type="text"
                id="globalSearchInput"
                class="block w-full pl-10 pr-3 py-2 border border-gray-200 rounded-md leading-5 bg-white text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-brand focus:border-brand sm:text-sm transition"
                placeholder="Search Series or Anime Names..."
              />
            </div>
            <button
              onclick="handleSync()"
              id="syncBtn"
              class="bg-brand hover:bg-brand-hover text-white px-4 py-2 rounded-md text-sm font-medium flex items-center transition shadow-sm"
            >
              <i class="fas fa-sync-alt mr-2" id="syncIcon"></i> Sync
            </button>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
      <!-- Loading State -->
      <div id="loading" class="flex flex-col items-center justify-center h-64">
        <i class="fas fa-circle-notch fa-spin text-4xl text-brand mb-4"></i>
        <p class="text-gray-500 font-medium mt-4">Searching Database...</p>
      </div>

      <div id="main-content" class="hidden">
        <!-- Header -->
        <div
          class="flex justify-between items-end mb-8 border-b border-gray-200 pb-4"
        >
          <div>
            <h1 class="text-3xl font-bold text-gray-900">Search Results</h1>
            <p class="text-gray-500 mt-1">
              Showing results for
              <span
                id="search-query-display"
                class="font-bold text-brand italic"
              ></span>
            </p>
          </div>
        </div>

        <div id="resultsContainer" class="flex flex-col gap-8">
          <!-- Sections Injected via JS -->
        </div>
      </div>
    </main>

    <!-- Scroll to Top Button -->
    <button
      id="scrollToTopBtn"
      onclick="scrollToTop()"
      class="fixed bottom-6 right-6 z-[60] bg-brand hover:bg-brand-hover text-white w-12 h-12 rounded-full shadow-xl flex items-center justify-center transition-all duration-300 opacity-0 translate-y-4 pointer-events-none"
    >
      <i class="fas fa-arrow-up"></i>
    </button>

    <!-- Global Toast Notification -->
    <div
      id="toast"
      class="fixed bottom-6 right-6 z-[100] transform transition-all duration-300 translate-y-20 opacity-0 bg-gray-900 text-white px-6 py-3 rounded-lg shadow-2xl flex items-center pointer-events-none"
    >
      <i id="toast-icon" class="fas fa-info-circle mr-3 text-lg"></i>
      <span id="toast-msg" class="font-medium text-sm"></span>
    </div>

    <footer class="bg-white border-t border-gray-200 mt-auto">
      <div
        class="max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8 flex justify-center text-sm text-gray-500"
      >
        &copy; 2026 CG1618 Anime Database. Version 1.0
      </div>
    </footer>

    <!-- Logic -->
    <script>
      const API_BASE_URL = "/api";
      let filteredSeries = [];
      let filteredAnime = [];
      let allAnimeData = [];

      // --- Universal UI Features ---
      const searchInput = document.getElementById("globalSearchInput");
      searchInput.addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
          const query = e.target.value.trim();
          if (query) {
            window.location.href = `/search?q=${encodeURIComponent(query)}`;
          }
        }
      });

      function showToast(message, isError = false) {
        const toast = document.getElementById("toast");
        const msg = document.getElementById("toast-msg");
        const icon = document.getElementById("toast-icon");

        msg.innerText = message;
        if (isError) {
          icon.className =
            "fas fa-exclamation-circle mr-3 text-red-400 text-lg";
          toast.classList.replace("bg-gray-900", "bg-red-900");
        } else {
          icon.className = "fas fa-check-circle mr-3 text-emerald-400 text-lg";
          toast.classList.replace("bg-red-900", "bg-gray-900");
        }

        toast.classList.remove("translate-y-20", "opacity-0");
        setTimeout(
          () => toast.classList.add("translate-y-20", "opacity-0"),
          3000,
        );
      }

      window.addEventListener("scroll", () => {
        const btn = document.getElementById("scrollToTopBtn");
        if (window.scrollY > 300) {
          btn.classList.remove(
            "opacity-0",
            "translate-y-4",
            "pointer-events-none",
          );
          btn.classList.add(
            "opacity-100",
            "translate-y-0",
            "pointer-events-auto",
          );
        } else {
          btn.classList.add(
            "opacity-0",
            "translate-y-4",
            "pointer-events-none",
          );
          btn.classList.remove(
            "opacity-100",
            "translate-y-0",
            "pointer-events-auto",
          );
        }
      });

      function scrollToTop() {
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      // --- Advanced Normalization Engine ---
      function normalizeSearchString(str) {
        if (!str) return "";
        // Removes spaces and punctuation. Makes "Sword Art Online" match "swordartonline"
        return String(str)
          .toLowerCase()
          .replace(/[^\p{L}\p{N}]/gu, "");
      }

      // --- Data Fetching & Execution ---
      async function performSearch() {
        const urlParams = new URLSearchParams(window.location.search);
        const query = urlParams.get("q") || "";

        document.getElementById("search-query-display").innerText =
          `"${query}"`;
        searchInput.value = query;

        try {
          const [animeRes, seriesRes] = await Promise.all([
            fetch(`${API_BASE_URL}/anime`),
            fetch(`${API_BASE_URL}/series`),
          ]);

          if (!animeRes.ok || !seriesRes.ok)
            throw new Error("Failed to load data");

          allAnimeData = await animeRes.json();
          const allSeriesData = await seriesRes.json();

          const qNormalized = normalizeSearchString(query);

          // 1. Filter Series Hubs
          filteredSeries = allSeriesData.filter((s) => {
            const sEn = normalizeSearchString(s.series_en);
            const sCn = normalizeSearchString(s.series_cn);
            const sRo = normalizeSearchString(s.series_roman);
            const sAlt = normalizeSearchString(s.alt_name);
            return (
              sEn.includes(qNormalized) ||
              sCn.includes(qNormalized) ||
              sRo.includes(qNormalized) ||
              sAlt.includes(qNormalized)
            );
          });

          // 2. Filter Anime Entries
          filteredAnime = allAnimeData.filter((a) => {
            const aEn = normalizeSearchString(a.series_season_en);
            const aCn = normalizeSearchString(a.series_season_cn);
            const aSeriesEn = normalizeSearchString(a.series_en);
            const aRoman = normalizeSearchString(a.series_season_roman);
            return (
              aEn.includes(qNormalized) ||
              aCn.includes(qNormalized) ||
              aSeriesEn.includes(qNormalized) ||
              aRoman.includes(qNormalized)
            );
          });

          renderResults();
        } catch (error) {
          console.error(error);
          document.getElementById("loading").innerHTML = `
            <div class="w-full text-center text-red-600 py-8 bg-red-50 rounded-xl border border-red-200 max-w-md mx-auto">
                <i class="fas fa-exclamation-triangle mb-2 text-2xl"></i>
                <p class="font-bold">Error loading search results.</p>
                <p class="text-sm mt-1">${error.message}</p>
            </div>`;
        }
      }

      // --- Rendering Logic ---
      function renderResults() {
        document.getElementById("loading").classList.add("hidden");
        document.getElementById("main-content").classList.remove("hidden");

        const container = document.getElementById("resultsContainer");
        container.innerHTML = "";

        if (filteredSeries.length === 0 && filteredAnime.length === 0) {
          container.innerHTML = `
                <div class="flex flex-col items-center justify-center py-16 bg-white rounded-2xl border border-gray-200 border-dashed">
                    <i class="fas fa-search text-4xl text-gray-300 mb-4"></i>
                    <p class="text-gray-500 font-medium text-lg">No entries found matching your search.</p>
                </div>`;
          return;
        }

        // --- Render Series Hubs ---
        if (filteredSeries.length > 0) {
          let html = `
                <div>
                    <div class="flex items-center mb-4 border-b border-gray-200 pb-3 pt-4 sticky top-16 z-40 bg-gray-50/95 backdrop-blur-md">
                        <h2 class="text-xl font-bold text-gray-900"><i class="fas fa-layer-group text-brand mr-2"></i> Franchise Hubs</h2>
                        <span class="ml-3 bg-brand/10 text-brand px-2.5 py-0.5 rounded-full text-xs font-bold border border-brand/20">${filteredSeries.length}</span>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            `;

          filteredSeries.forEach((series) => {
            const title =
              series.series_cn || series.series_en || "Unknown Series";
            html += `
                    <div class="bg-white rounded-xl border border-gray-200 p-4 card-hover shadow-sm flex items-center justify-between" onclick="window.location.href='/series/${series.system_id}'">
                        <div class="min-w-0 pr-4">
                            <h3 class="text-lg font-bold text-gray-900 truncate">${title}</h3>
                            <p class="text-sm text-gray-500 truncate">${series.series_en || ""}</p>
                        </div>
                        <div class="bg-brand/10 text-brand px-3 py-1.5 rounded-lg text-xs font-bold whitespace-nowrap shrink-0">
                            View Hub <i class="fas fa-arrow-right ml-1"></i>
                        </div>
                    </div>
                `;
          });

          html += `</div></div>`;
          container.innerHTML += html;
        }

        // --- Render Anime Entries ---
        if (filteredAnime.length > 0) {
          let html = `
                <div>
                    <div class="flex items-center mb-4 border-b border-gray-200 pb-3 pt-4 sticky top-16 z-40 bg-gray-50/95 backdrop-blur-md">
                        <h2 class="text-xl font-bold text-gray-900"><i class="fas fa-film text-brand mr-2"></i> Individual Entries</h2>
                        <span class="ml-3 bg-brand/10 text-brand px-2.5 py-0.5 rounded-full text-xs font-bold border border-brand/20">${filteredAnime.length}</span>
                    </div>
                    <div class="flex flex-col gap-8">
            `;

          // Group by format
          const groups = { TV: [], ONA: [], Movie: [], Other: [] };
          filteredAnime.forEach((anime) => {
            const type = (anime.airing_type || "").toUpperCase();
            if (type === "TV") groups["TV"].push(anime);
            else if (type === "ONA") groups["ONA"].push(anime);
            else if (type === "MOVIE") groups["Movie"].push(anime);
            else groups["Other"].push(anime);
          });

          // Sort logic (Release Date)
          const parseReleaseDate = (dateStr) => {
            if (!dateStr) return 999999;
            const str = String(dateStr).trim().toUpperCase();
            if (str === "TBA" || str === "") return 999999;

            const yearMatch = str.match(/\d{4}/);
            if (yearMatch) {
              const year = parseInt(yearMatch[0], 10);
              let month = 2;
              if (str.includes("WIN") || str.includes("JAN")) month = 1;
              else if (str.includes("SPR") || str.includes("APR")) month = 4;
              else if (str.includes("SUM") || str.includes("JUL")) month = 7;
              else if (str.includes("FAL") || str.includes("OCT")) month = 10;
              return year * 100 + month;
            }
            return 999999;
          };

          const sortByReleaseDate = (a, b) => {
            let valA = parseReleaseDate(a.release_date);
            let valB = parseReleaseDate(b.release_date);
            if (valA !== valB) return valA - valB;
            let titleA = String(a.series_season_en || a.series_en || "")
              .trim()
              .toLowerCase();
            let titleB = String(b.series_season_en || b.series_en || "")
              .trim()
              .toLowerCase();
            return titleA < titleB ? -1 : titleA > titleB ? 1 : 0;
          };

          groups["TV"].sort(sortByReleaseDate);
          groups["ONA"].sort(sortByReleaseDate);
          groups["Movie"].sort(sortByReleaseDate);
          groups["Other"].sort(sortByReleaseDate);

          // Sub-section renderer (Uses identical Library Card grid)
          const renderSubSection = (title, entries, icon) => {
            if (entries.length === 0) return "";
            let subHtml = `
                    <div class="mb-4 last:mb-0">
                        <div class="flex items-center mb-3 sticky top-[120px] z-30 bg-gray-50/95 backdrop-blur-md py-2 border-b border-gray-100">
                            <h3 class="text-base font-bold text-gray-800 uppercase tracking-wide"><i class="fas ${icon} text-brand mr-2 w-5 text-center"></i> ${title}</h3>
                            <span class="ml-2 bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full text-[10px] font-bold border border-gray-200">${entries.length}</span>
                        </div>
                        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 sm:gap-6">
                `;
            entries.forEach((anime) => {
              subHtml += createLibraryCard(anime);
            });
            subHtml += `</div></div>`;
            return subHtml;
          };

          html += renderSubSection("TV", groups["TV"], "fa-tv");
          html += renderSubSection("ONA", groups["ONA"], "fa-globe");
          html += renderSubSection("Movie", groups["Movie"], "fa-film");
          html += renderSubSection(
            "Other",
            groups["Other"],
            "fa-question-circle",
          );

          html += `</div></div>`;
          container.innerHTML += html;
        }
      }

      // --- Component Renderers ---
      // Exact match to Library/Series card for UI consistency
      function createLibraryCard(anime) {
        const title =
          anime.series_season_cn ||
          anime.series_season_en ||
          anime.series_en ||
          "Unknown Title";
        const epFin = anime.ep_fin || 0;
        const epTotal = anime.ep_total || "?";

        let statusColor = "bg-gray-800";
        if (anime.my_progress === "Active Watching")
          statusColor = "bg-green-600";
        if (
          anime.my_progress === "Completed" ||
          anime.my_progress === "Finished"
        )
          statusColor = "bg-brand";

        const fallbackSvg = `data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100%' height='100%'><rect width='100%' height='100%' fill='%23E5E7EB'/><text x='50%' y='50%' font-family='Arial' font-size='12' fill='%236B7280' font-weight='bold' dominant-baseline='middle' text-anchor='middle'>No Image</text></svg>`;

        return `
            <div class="bg-white rounded-xl border border-gray-200 overflow-hidden card-hover shadow-sm flex flex-col h-full group">
                <div class="relative w-full aspect-[3/4] bg-gray-100 cursor-pointer overflow-hidden" onclick="window.location.href='/anime/${anime.system_id}'">
                    <img src="${anime.cover_image_url || ""}" alt="Cover" class="w-full h-full object-cover transition duration-300 group-hover:scale-105" onerror="this.src='${fallbackSvg}'">
                    
                    <div class="absolute top-2 left-2 flex flex-col gap-1">
                        ${anime.mal_rating ? `<span class="bg-[#2e51a2]/90 backdrop-blur-sm text-white text-[10px] font-bold px-1.5 py-0.5 rounded shadow"><i class="fas fa-star text-yellow-400 mr-1"></i>${anime.mal_rating.toFixed(2)}</span>` : ""}
                        ${anime.rating_mine ? `<span class="bg-yellow-400/90 backdrop-blur-sm text-yellow-900 text-[10px] font-bold px-1.5 py-0.5 rounded shadow">My: ${anime.rating_mine}</span>` : ""}
                    </div>

                    <div class="absolute bottom-0 left-0 w-full h-1 bg-gray-900/50">
                        <div class="h-full ${statusColor}" style="width: ${anime.ep_total ? Math.round((epFin / anime.ep_total) * 100) : epFin > 0 ? 100 : 0}%"></div>
                    </div>
                </div>

                <div class="p-3 flex flex-col flex-1">
                    <h3 class="font-bold text-gray-900 text-sm line-clamp-2 leading-snug mb-1 cursor-pointer hover:text-brand" onclick="window.location.href='/anime/${anime.system_id}'" title="${title}">${title}</h3>
                    <p class="text-[11px] text-gray-500 font-medium mb-3">${anime.airing_type || "TV"} &bull; ${anime.release_date || "TBA"}</p>
                    
                    <div class="mt-auto flex items-center justify-between">
                        <span class="text-xs font-bold text-gray-700 bg-gray-100 px-2 py-1 rounded">
                            <span id="card-ep-${anime.system_id}">${epFin}</span> / ${epTotal}
                        </span>
                        
                        <button onclick="optimisticSearchUpdate('${anime.system_id}', 1); event.stopPropagation();" class="w-7 h-7 rounded bg-brand/10 hover:bg-brand text-brand hover:text-white transition flex items-center justify-center" title="Add 1 Episode">
                            <i class="fas fa-plus text-[10px]"></i>
                        </button>
                    </div>
                </div>
            </div>
          `;
      }

      // --- Optimistic State Management ---
      async function optimisticSearchUpdate(sys_id, change) {
        const index = filteredAnime.findIndex((a) => a.system_id === sys_id);
        if (index === -1) return;

        const anime = filteredAnime[index];
        const currentEps = anime.ep_fin || 0;
        let newEps = currentEps + change;

        if (newEps < 0) newEps = 0;
        if (anime.ep_total && newEps > anime.ep_total) newEps = anime.ep_total;
        if (newEps === currentEps) return; // No change

        // 1. Optimistic Update in DOM directly to prevent re-rendering search view
        filteredAnime[index].ep_fin = newEps;
        const countSpan = document.getElementById(`card-ep-${sys_id}`);
        if (countSpan) countSpan.innerText = newEps;

        // Also update base memory array just in case
        const allIndex = allAnimeData.findIndex((a) => a.system_id === sys_id);
        if (allIndex !== -1) allAnimeData[allIndex].ep_fin = newEps;

        // 2. Background API Request
        try {
          const res = await fetch(`${API_BASE_URL}/anime/${sys_id}/progress`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ ep_fin: newEps }),
          });

          if (!res.ok) throw new Error("Failed to sync");
        } catch (error) {
          // Revert
          filteredAnime[index].ep_fin = currentEps;
          if (allIndex !== -1) allAnimeData[allIndex].ep_fin = currentEps;
          if (countSpan) countSpan.innerText = currentEps;
          showToast("Network error. Progress reverted.", true);
        }
      }

      // --- Sync Orchestration ---
      async function handleSync() {
        const icon = document.getElementById("syncIcon");
        const btn = document.getElementById("syncBtn");

        icon.classList.add("fa-spin");
        btn.classList.add("opacity-75", "pointer-events-none");
        btn.innerText = " Syncing...";
        btn.prepend(icon);

        try {
          const response = await fetch(`${API_BASE_URL}/admin/sync`, {
            method: "POST",
          });
          if (response.ok) {
            icon.classList.remove("fa-spin", "fa-sync-alt");
            icon.classList.add("fa-check");
            btn.classList.remove(
              "bg-brand",
              "hover:bg-brand-hover",
              "opacity-75",
              "pointer-events-none",
            );
            btn.classList.add("bg-emerald-500", "hover:bg-emerald-600");
            btn.innerText = " Synced!";
            btn.prepend(icon);

            showToast("Successfully synchronized with Google Sheets!");
            await performSearch(); // Silently refresh search data

            setTimeout(() => {
              icon.classList.remove("fa-check");
              icon.classList.add("fa-sync-alt");
              btn.classList.remove("bg-emerald-500", "hover:bg-emerald-600");
              btn.classList.add("bg-brand", "hover:bg-brand-hover");
              btn.innerText = " Sync";
              btn.prepend(icon);
            }, 2000);
          } else {
            throw new Error((await response.json()).detail);
          }
        } catch (error) {
          icon.classList.remove("fa-spin");
          btn.classList.remove("opacity-75", "pointer-events-none");
          btn.innerText = " Sync";
          btn.prepend(icon);

          showToast(`Sync Error: ${error.message}`, true);
        }
      }

      // Initialize page
      document.addEventListener("DOMContentLoaded", performSearch);
    </script>
  </body>
</html>
