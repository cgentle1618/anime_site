<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library - CG1618 Anime Site</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Roboto", "Noto Sans TC", "sans-serif"] },
            colors: { brand: { DEFAULT: "#6366f1", hover: "#4f46e5" } },
          },
        },
      };
    </script>
    <style>
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f3f4f6;
      }
      ::-webkit-scrollbar-thumb {
        background: #d1d5db;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #9ca3af;
      }
      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      input[type="number"] {
        -moz-appearance: textfield;
      }
    </style>
  </head>

  <body
    class="bg-gray-50 text-gray-900 h-screen w-screen overflow-hidden flex flex-col font-sans"
  >
    <!-- Top Navigation Bar -->
    <nav

      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
          <div class="flex items-center space-x-8">
            <a
              href="/"
              class="flex-shrink-0 font-bold text-2xl tracking-wider text-brand"

            >
            <div class="hidden md:block">
              <div class="flex items-baseline space-x-4">
                <a
                  href="/"

                >
                <a
                  href="/library"
                  class="bg-gray-100 text-gray-900 px-3 py-2 rounded-md text-sm font-medium"

                <!-- Admin Dropdown -->
                <div class="relative group">
                  <button

                  >
                    Admin <i class="fas fa-chevron-down ml-1.5 text-[10px]"></i>
                  </button>
                  <div
                    class="absolute left-0 top-full pt-1 w-32 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50"
                  >
                    <div
                      class="bg-white border border-gray-200 rounded-lg shadow-lg overflow-hidden flex flex-col"
                    >
                      <a
                        href="/system"
                        class="px-4 py-2.5 text-sm text-gray-700 hover:bg-brand/5 hover:text-brand font-medium transition border-b border-gray-100"
                        >Admin</a
                      >
                      <a
                        href="/add"
                        class="px-4 py-2.5 text-sm text-gray-700 hover:bg-brand/5 hover:text-brand font-medium transition"
                        >Add</a
                      >
                      <a
                        href="/modify"
                        class="px-4 py-2.5 text-sm text-gray-700 hover:bg-brand/5 hover:text-brand font-medium transition"
                        >Modify</a
                      >
                      <a
                        href="/delete"
                        class="px-4 py-2.5 text-sm text-gray-700 hover:bg-brand/5 hover:text-brand font-medium transition"
                        >Delete</a
                      >
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="flex items-center space-x-4 flex-1 justify-end">
            <div class="relative w-full max-w-md hidden sm:block">
              <div
                class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
              >
                <i class="fas fa-search text-gray-400"></i>
              </div>
              <input
                type="text"
                id="globalSearchInput"
                class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md leading-5 bg-white text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-brand focus:border-brand sm:text-sm transition"
                placeholder="Search Series or Anime Names..."
              />
            </div>

            <button
              onclick="handleSync()"
              id="syncBtn"
              class="bg-brand hover:bg-brand-hover text-white px-4 py-2 rounded-md text-sm font-medium flex items-center transition shadow-sm"
            >
              <i class="fas fa-sync-alt mr-2" id="syncIcon"></i> Sync
            </button>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 w-full max-w-[100vw] px-4 py-6 flex flex-col min-h-0">
      <!-- Toolbar: Sorting & Collapse Controls -->
      <div class="mb-4 flex justify-between items-center shrink-0">
        <!-- New Sorting Block -->
        <div
          class="flex items-center space-x-3 bg-white border border-gray-300 rounded-md px-3 py-1.5 shadow-sm"
        >
          <label
            for="sortDropdown"
            class="text-sm font-bold text-gray-500 uppercase tracking-wider"
            ><i class="fas fa-sort-amount-down mr-1.5 text-brand"></i> Sort
            By:</label
          >
          <select
            id="sortDropdown"
            onchange="handleSort(this.value)"
            class="bg-transparent text-sm font-bold text-gray-800 focus:outline-none cursor-pointer border-none outline-none pr-2"
          >
            <option value="title" selected>Title (A-Z)</option>
            <option value="rating_mine">Rating (Highest First)</option>
            <option value="my_progress">My Progress (Status Order)</option>
            <option value="release_date">Release Date (Chronological)</option>
          </select>
        </div>

        <button
          onclick="toggleAll()"
          id="toggleAllBtn"
          class="bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 px-3 py-1.5 rounded-md text-sm font-medium transition shadow-sm flex items-center w-36 justify-center"
        >
          <i class="fas fa-compress-arrows-alt mr-2"></i> Collapse All
        </button>
      </div>

      <div
        class="bg-white rounded-xl shadow-sm border border-gray-200 flex-1 overflow-hidden flex flex-col min-h-0"
      >
        <div
          id="tableContainer"
          class="overflow-auto flex-1 relative w-full h-full"
        >
          <table class="w-full text-sm text-left whitespace-nowrap min-w-max">
            <thead class="text-xs text-gray-600 uppercase">
              <tr>
                <!-- Headers are no longer sortable or clickable -->
                <th
                  scope="col"
                  class="px-4 py-3 sticky top-0 z-40 bg-gray-50 shadow-[0_1px_0_0_#e5e7eb]"
                >
                  Title
                </th>
                <th
                  scope="col"
                  class="px-4 py-3 sticky top-0 z-40 bg-gray-50 shadow-[0_1px_0_0_#e5e7eb]"
                >
                  Season
                </th>
                <th
                  scope="col"
                  class="px-4 py-3 sticky top-0 z-40 bg-gray-50 shadow-[0_1px_0_0_#e5e7eb]"
                >
                  Rating
                </th>
                <th
                  scope="col"
                  class="px-4 py-3 sticky top-0 z-40 bg-gray-50 shadow-[0_1px_0_0_#e5e7eb]"
                >
                  My Progress
                </th>
                <th
                  scope="col"
                  class="px-4 py-3 sticky top-0 z-40 bg-gray-50 shadow-[0_1px_0_0_#e5e7eb]"
                >
                  Episodes
                </th>
                <th
                  scope="col"
                  class="px-4 py-3 sticky top-0 z-40 bg-gray-50 shadow-[0_1px_0_0_#e5e7eb]"
                >
                  Type
                </th>
                <th
                  scope="col"
                  class="px-4 py-3 sticky top-0 z-40 bg-gray-50 shadow-[0_1px_0_0_#e5e7eb]"
                >
                  Class
                </th>
                <th
                  scope="col"
                  class="px-4 py-3 sticky top-0 z-40 bg-gray-50 shadow-[0_1px_0_0_#e5e7eb]"
                >
                  Airing
                </th>
                <th
                  scope="col"
                  class="px-4 py-3 sticky top-0 z-40 bg-gray-50 shadow-[0_1px_0_0_#e5e7eb]"
                >
                  Release
                </th>
                <th
                  scope="col"
                  class="px-4 py-3 sticky top-0 z-40 bg-gray-50 shadow-[0_1px_0_0_#e5e7eb]"
                >
                  Studio
                </th>
                <th
                  scope="col"
                  class="px-4 py-3 sticky top-0 z-40 bg-gray-50 shadow-[0_1px_0_0_#e5e7eb]"
                >
                  Director
                </th>
                <th
                  scope="col"
                  class="px-4 py-3 sticky top-0 z-40 bg-gray-50 shadow-[0_1px_0_0_#e5e7eb]"
                >
                  Distributor
                </th>
                <th
                  scope="col"
                  class="px-4 py-3 sticky top-0 z-40 bg-gray-50 shadow-[0_1px_0_0_#e5e7eb]"
                >
                  巴哈
                </th>
                <th
                  scope="col"
                  class="px-4 py-3 sticky top-0 z-40 bg-gray-50 shadow-[0_1px_0_0_#e5e7eb] max-w-[200px]"
                >
                  Notes
                </th>
              </tr>
            </thead>
            <tbody id="libraryTableBody" class="divide-y divide-gray-200">
              <!-- Rows injected via JS -->
            </tbody>
          </table>
        </div>
      </div>
    </main>

    <button
      id="scrollToTopBtn"
      onclick="scrollToTop()"
      class="fixed bottom-6 right-6 z-[60] bg-brand hover:bg-brand-hover text-white w-12 h-12 rounded-full shadow-xl flex items-center justify-center transition-all duration-300 opacity-0 translate-y-4 pointer-events-none"
    >
      <i class="fas fa-arrow-up"></i>
    </button>

    <script>
      const API_BASE_URL = "/api";
      let originalData = [];
      let displayData = [];
      let sortCol = "title";
      let sortAsc = true; // Permanently locked to true for strictly directed sorting

      let collapsedSeries = new Set();
      let isAllCollapsed = false;
      let seriesMetadata = {};

      async function fetchLibrary() {
        try {
          const [animeRes, seriesRes] = await Promise.all([
            fetch(`${API_BASE_URL}/anime`),
            fetch(`${API_BASE_URL}/series`),
          ]);
          originalData = await animeRes.json();
          const seriesData = await seriesRes.json();
          seriesData.forEach((s) => {
            if (s.series_en) seriesMetadata[s.series_en] = s;
          });
          displayData = [...originalData];
          renderTable();
        } catch (error) {
          console.error("Failed to load library data:", error);
        }
      }

      function getDisplayTitle(anime) {
        let mainTitle = anime.series_season_cn;
        if (!mainTitle) {
          mainTitle =
            anime.series_season_en || anime.series_en || "Unknown Title";
        }
        return mainTitle;
      }

      const parseReleaseDate = (dateStr) => {
        if (!dateStr) return 999999;
        const str = String(dateStr).trim().toUpperCase();
        if (str === "TBA" || str === "") return 999999;
        const yearMatch = str.match(/\d{4}/);
        if (yearMatch) {
          const year = parseInt(yearMatch[0], 10);
          let month = 2; // Default to Feb
          if (str.includes("WIN")) month = 1;
          else if (str.includes("SPR")) month = 4;
          else if (str.includes("SUM")) month = 7;
          else if (str.includes("FAL")) month = 10;
          else if (str.includes("JAN")) month = 1;
          else if (str.includes("FEB")) month = 2;
          else if (str.includes("MAR")) month = 3;
          else if (str.includes("APR")) month = 4;
          else if (str.includes("MAY")) month = 5;
          else if (str.includes("JUN")) month = 6;
          else if (str.includes("JUL")) month = 7;
          else if (str.includes("AUG")) month = 8;
          else if (str.includes("SEP")) month = 9;
          else if (str.includes("OCT")) month = 10;
          else if (str.includes("NOV")) month = 11;
          else if (str.includes("DEC")) month = 12;
          return year * 100 + month;
        }
        return 999999;
      };

      function calculateSeriesProgress(entries) {
        if (!entries || entries.length === 0) return [];
        let statuses = [];

        const allFinished = entries.every(
          (e) => e.my_progress === "Completed" || e.my_progress === "Finished",
        );
        if (allFinished) return ["Completely Finished"];

        const mainStoryEntries = entries.filter(
          (e) => e.main_spinoff === "本傳",
        );
        if (mainStoryEntries.length > 0) {
          const mainFinished = mainStoryEntries.every(
            (e) =>
              e.my_progress === "Completed" || e.my_progress === "Finished",
          );
          if (mainFinished) statuses.push("Finished Main Story");
        }

        const priorityStatuses = [
          "Active Watching",
          "Passive Watching",
          "Paused",
          "Temp Dropped",
          "Dropped",
        ];
        let foundPriority = false;
        for (let status of priorityStatuses) {
          if (entries.some((e) => e.my_progress === status)) {
            statuses.push(status);
            foundPriority = true;
            break;
          }
        }

        if (!foundPriority) {
          const allFinishedOrNotAired = entries.every(
            (e) =>
              e.my_progress === "Completed" ||
              e.my_progress === "Finished" ||
              e.airing_status === "Not Yet Aired" ||
              e.my_progress === "Watch When Airs" ||
              e.my_progress === "Not Yet Aired",
          );
          if (
            allFinishedOrNotAired &&
            entries.some(
              (e) =>
                e.airing_status === "Not Yet Aired" ||
                e.my_progress === "Watch When Airs" ||
                e.my_progress === "Not Yet Aired",
            )
          ) {
            statuses.push("Waiting for New Release");
          } else {
            const allFinishedOrWontWatch = entries.every(
              (e) =>
                e.my_progress === "Completed" ||
                e.my_progress === "Finished" ||
                e.my_progress === "Won't Watch",
            );
            if (
              allFinishedOrWontWatch &&
              entries.some((e) => e.my_progress === "Won't Watch")
            ) {
              statuses.push("Finished");
            }
          }
        }
        return statuses;
      }

      function renderTable() {
        const tbody = document.getElementById("libraryTableBody");
        tbody.innerHTML = "";

        // 1. Group Data strictly by series_en
        const groupedData = {};
        displayData.forEach((anime) => {
          const seriesName = anime.series_en || "Standalone / Other";
          if (!groupedData[seriesName]) {
            groupedData[seriesName] = [];
          }
          groupedData[seriesName].push(anime);
        });

        // 2. Sort Series Groups
        let seriesNames = Object.keys(groupedData);
        seriesNames.sort((a, b) => {
          // Force 'Standalone / Other' to always stay at the very bottom
          if (a === "Standalone / Other" && b !== "Standalone / Other")
            return 1;
          if (b === "Standalone / Other" && a !== "Standalone / Other")
            return -1;

          // Strictly sort by the group key (series_en) lowercase
          let nameA = String(a).trim().toLowerCase();
          let nameB = String(b).trim().toLowerCase();

          let comparison = nameA < nameB ? -1 : nameA > nameB ? 1 : 0;

          if (sortCol === "title" || sortCol === "") {
            return sortAsc ? comparison : -comparison;
          }
          // Always lock series alphabetical order when sorting internals by Rating, Release Date, etc.
          return comparison;
        });

        // 3. Render Groups and their Items
        seriesNames.forEach((seriesName) => {
          const meta = seriesMetadata[seriesName] || {};
          const animesInSeries = groupedData[seriesName];

          const isCollapsed = collapsedSeries.has(seriesName);
          const chevronClass = isCollapsed
            ? "fa-chevron-right text-gray-400"
            : "fa-chevron-down text-gray-600";

          let seriesRatingBadge = "";
          if (meta.rating_series) {
            let colorClass = "bg-gray-100 text-gray-600 border-gray-300";
            if (meta.rating_series === "S")
              colorClass = "bg-yellow-100 text-yellow-700 border-yellow-300";
            else if (meta.rating_series === "A+")
              colorClass = "bg-orange-100 text-orange-700 border-orange-300";
            else if (meta.rating_series === "A")
              colorClass = "bg-red-100 text-red-700 border-red-300";
            else if (meta.rating_series === "B")
              colorClass = "bg-blue-100 text-blue-700 border-blue-300";
            else if (
              meta.rating_series === "C" ||
              meta.rating_series === "D" ||
              meta.rating_series === "E" ||
              meta.rating_series === "F"
            )
              colorClass = "bg-gray-200 text-gray-600 border-gray-300";

            seriesRatingBadge = `<span class="ml-3 px-2 py-0.5 rounded text-[10px] font-bold uppercase border shadow-sm tracking-wider shrink-0 ${colorClass}">Overall: ${meta.rating_series}</span>`;
          }

          const seriesStatuses = calculateSeriesProgress(animesInSeries);
          let progressBadgesHtml = "";

          seriesStatuses.forEach((seriesProgress) => {
            let progressColorClass =
              "bg-gray-100 text-gray-600 border-gray-300";
            if (seriesProgress === "Active Watching")
              progressColorClass =
                "bg-green-100 text-green-700 border-green-300";
            else if (seriesProgress === "Passive Watching")
              progressColorClass = "bg-blue-100 text-blue-700 border-blue-300";
            else if (seriesProgress === "Paused")
              progressColorClass =
                "bg-orange-100 text-orange-700 border-orange-300";
            else if (
              seriesProgress === "Temp Dropped" ||
              seriesProgress === "Dropped"
            )
              progressColorClass = "bg-red-100 text-red-700 border-red-300";
            else if (seriesProgress === "Completely Finished")
              progressColorClass =
                "bg-purple-100 text-purple-700 border-purple-300";
            else if (seriesProgress === "Waiting for New Release")
              progressColorClass = "bg-teal-100 text-teal-700 border-teal-300";
            else if (seriesProgress === "Finished Main Story")
              progressColorClass =
                "bg-indigo-100 text-indigo-700 border-indigo-300";
            else if (seriesProgress === "Finished")
              progressColorClass =
                "bg-purple-50 text-purple-600 border-purple-200";

            progressBadgesHtml += `<span class="ml-2 px-2 py-0.5 rounded text-[10px] font-bold uppercase border shadow-sm tracking-wider shrink-0 ${progressColorClass}">${seriesProgress}</span>`;
          });

          const goToSeriesBtn = meta.system_id
            ? `
            <button onclick="goToSeries(event, '${meta.system_id}')" class="ml-4 bg-white border border-gray-200 hover:border-brand text-gray-600 hover:text-brand px-2.5 py-1.5 rounded-md text-[11px] font-bold uppercase tracking-wider transition-all shadow-sm flex items-center hover:bg-brand/5 shrink-0" title="Open Series Hub">
                Go to Series <i class="fas fa-external-link-alt ml-1.5 opacity-70"></i>
            </button>
          `
            : "";

          const headerTr = document.createElement("tr");
          headerTr.className =
            "cursor-pointer hover:bg-gray-100 transition group";
          headerTr.onclick = () => toggleSeries(seriesName);

          headerTr.innerHTML = `
              <td colspan="14" class="px-4 py-3 text-sm font-bold text-gray-900 sticky top-[41px] z-30 bg-gray-100/95 backdrop-blur-md shadow-[0_1px_0_0_#e5e7eb] border-b border-gray-200">
                <div class="flex items-center justify-between">
                  <div class="flex items-center flex-wrap gap-y-1">
                    <i class="fas ${chevronClass} w-4 mr-1 transition-transform"></i>
                    <i class="fas fa-layer-group text-brand mr-2"></i>
                    <span class="truncate max-w-[300px] xl:max-w-[400px]">${meta.series_cn || seriesName}</span>
                    <span class="text-gray-400 font-normal ml-2 mr-2 text-xs truncate max-w-[200px]">${seriesName !== "Other" ? seriesName : ""}</span>
                    ${seriesRatingBadge}
                    ${progressBadgesHtml}
                  </div>
                  <div class="flex items-center">
                    ${goToSeriesBtn}
                  </div>
                </div>
              </td>
          `;
          tbody.appendChild(headerTr);

          if (isCollapsed) return;

          // 4. Sort Items INSIDE the group dynamically
          animesInSeries.sort((a, b) => {
            if (sortCol === "rating_mine") {
              const tiers = {
                S: 1,
                "A+": 2,
                A: 3,
                B: 4,
                C: 5,
                D: 6,
                E: 7,
                F: 8,
              };
              let valA = tiers[a.rating_mine] || 99;
              let valB = tiers[b.rating_mine] || 99;
              if (valA !== valB) return sortAsc ? valA - valB : valB - valA;
            } else if (sortCol === "release_date") {
              let valA = parseReleaseDate(a.release_date);
              let valB = parseReleaseDate(b.release_date);
              if (valA !== valB) return sortAsc ? valA - valB : valB - valA;
            } else if (sortCol === "my_progress") {
              // Custom Watch Status Hierarchy Sort
              const statusOrder = {
                Finished: 1,
                Completed: 1,
                "Active Watching": 2,
                "Passive Watching": 3,
                "Watch When Airs": 4,
                "Plan to Watch": 5,
                "Might Watch": 6,
                Paused: 7,
                "Temp Dropped": 8,
                Dropped: 9,
                "Won't Watch": 10,
              };
              let valA = statusOrder[a.my_progress] || 99;
              let valB = statusOrder[b.my_progress] || 99;
              if (valA !== valB) return sortAsc ? valA - valB : valB - valA;
            }

            // Default Fallback / Tie-Breaker: Title Sort
            // STRICTLY sort by series_season_en
            let nameA = String(a.series_season_en || "")
              .trim()
              .toLowerCase();
            let nameB = String(b.series_season_en || "")
              .trim()
              .toLowerCase();
            let comparison = nameA < nameB ? -1 : nameA > nameB ? 1 : 0;

            if (sortCol === "title") {
              return sortAsc ? comparison : -comparison;
            }
            return comparison; // Default chronological/alphabetical
          });

          // 5. Render Individual Anime Rows
          animesInSeries.forEach((anime) => {
            const title = getDisplayTitle(anime);
            const rating = anime.rating_mine || "-";
            const status = anime.my_progress || "-";
            const epFin = anime.ep_fin || 0;
            const epTotal = anime.ep_total || "?";

            const epsInput = `
                        <div class="flex items-center">
                            <input type="number" value="${epFin}" min="0" ${anime.ep_total ? `max="${anime.ep_total}"` : ""}
                                   onchange="updateEpisode('${anime.system_id}', this.value, ${epFin})"
                                   class="w-8 bg-transparent border-b border-dashed border-gray-400 hover:border-brand focus:border-solid focus:border-brand focus:outline-none text-center font-mono py-0.5 transition-colors"
                                   onclick="this.select()">
                            <span class="text-gray-500 font-mono ml-1">/ ${epTotal}</span>
                        </div>
                    `;

            const bahaStr = String(anime.source_baha || "").toUpperCase();
            const bahaDisplay =
              bahaStr === "TRUE" || bahaStr === "YES" || bahaStr === "有"
                ? "有"
                : "無";
            const bahaColor =
              bahaDisplay === "有"
                ? "text-green-600 font-bold"
                : "text-gray-400";

            let statusColor = "text-gray-600 bg-gray-100";
            if (status === "Active Watching")
              statusColor = "text-green-700 bg-green-100";
            if (status === "Passive Watching")
              statusColor = "text-blue-700 bg-blue-100";
            if (status === "Paused")
              statusColor = "text-orange-700 bg-orange-100";
            if (status === "Completed" || status === "Finished")
              statusColor = "text-purple-700 bg-purple-100";
            if (status === "Dropped" || status === "Temp Dropped")
              statusColor = "text-red-700 bg-red-100";
            if (status === "Plan to Watch" || status === "Might Watch")
              statusColor = "text-teal-700 bg-teal-100";

            let ratingColor = "text-gray-600";
            if (["S", "A+", "A"].includes(rating))
              ratingColor = "text-red-600 font-bold";
            else if (["B", "C"].includes(rating))
              ratingColor = "text-blue-600 font-medium";

            const tr = document.createElement("tr");
            tr.className = "hover:bg-gray-50 transition-colors";

            tr.innerHTML = `
                        <td class="px-4 py-3 pl-10 font-medium text-gray-900 max-w-[250px] truncate" title="${title}">
                            <a href="/anime/${anime.system_id}" class="hover:text-brand hover:underline transition-colors block w-full truncate">${title}</a>
                        </td>
                        <td class="px-4 py-3 text-gray-600 font-medium whitespace-nowrap">${anime.series_season || "-"}</td>
                        <td class="px-4 py-3 ${ratingColor}">${rating}</td>
                        <td class="px-4 py-3">
                            <span class="px-2 py-1 text-xs rounded-md ${statusColor}">${status}</span>
                        </td>
                        <td class="px-4 py-3 text-xs">${epsInput}</td>
                        <td class="px-4 py-3 text-gray-500">${anime.airing_type || "-"}</td>
                        <td class="px-4 py-3 text-gray-500">${anime.main_spinoff || "-"}</td>
                        <td class="px-4 py-3 text-gray-500">${anime.airing_status || "-"}</td>
                        <td class="px-4 py-3 text-gray-900">${anime.release_date || "-"}</td>
                        <td class="px-4 py-3 text-gray-500 max-w-[150px] truncate" title="${anime.studio || ""}">${anime.studio || "-"}</td>
                        <td class="px-4 py-3 text-gray-500 max-w-[150px] truncate" title="${anime.director || ""}">${anime.director || "-"}</td>
                        <td class="px-4 py-3 text-gray-500">${anime.distributor_tw || "-"}</td>
                        <td class="px-4 py-3 ${bahaColor}">${bahaDisplay}</td>
                        <td class="px-4 py-3 text-gray-400 max-w-[200px] truncate" title="${anime.remark || ""}">${anime.remark || "-"}</td>
                    `;
            tbody.appendChild(tr);
          });
        });
      }

      function toggleSeries(seriesName) {
        if (collapsedSeries.has(seriesName)) {
          collapsedSeries.delete(seriesName);
        } else {
          collapsedSeries.add(seriesName);
        }
        renderTable();
      }

      function toggleAll() {
        const btn = document.getElementById("toggleAllBtn");
        const uniqueSeries = new Set();
        displayData.forEach((anime) =>
          uniqueSeries.add(anime.series_en || "Standalone / Other"),
        );

        isAllCollapsed = !isAllCollapsed;

        if (isAllCollapsed) {
          uniqueSeries.forEach((s) => collapsedSeries.add(s));
          btn.innerHTML =
            '<i class="fas fa-expand-arrows-alt mr-2"></i> Expand All';
        } else {
          collapsedSeries.clear();
          btn.innerHTML =
            '<i class="fas fa-compress-arrows-alt mr-2"></i> Collapse All';
        }
        renderTable();
      }

      async function updateEpisode(systemId, newValue, oldValue) {
        const parsedValue = parseInt(newValue, 10);
        if (isNaN(parsedValue) || parsedValue < 0) return;

        const displayIndex = displayData.findIndex(
          (a) => a.system_id === systemId,
        );
        if (displayIndex !== -1) displayData[displayIndex].ep_fin = parsedValue;

        const origIndex = originalData.findIndex(
          (a) => a.system_id === systemId,
        );
        if (origIndex !== -1) originalData[origIndex].ep_fin = parsedValue;

        try {
          const response = await fetch(
            `${API_BASE_URL}/anime/${systemId}/progress`,
            {
              method: "PATCH",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ ep_fin: parsedValue }),
            },
          );
        } catch (error) {
          console.error(error);
          if (displayIndex !== -1) displayData[displayIndex].ep_fin = oldValue;
          if (origIndex !== -1) originalData[origIndex].ep_fin = oldValue;
          renderTable();
        }
      }

      function handleSort(column) {
        sortCol = column;
        renderTable();
      }

      function goToSeries(event, systemId) {
        event.stopPropagation();
        if (systemId) {
          window.location.href = `/series/${systemId}`;
        }
      }

      async function handleSync() {
        const icon = document.getElementById("syncIcon");
        const btn = document.getElementById("syncBtn");

        icon.classList.add("fa-spin");
        btn.classList.add("opacity-75", "pointer-events-none");
        btn.innerText = " Syncing...";
        btn.prepend(icon);

        try {
          const response = await fetch(`${API_BASE_URL}/sync`, {
            method: "POST",
          });
          if (response.ok) {
            icon.classList.remove("fa-spin", "fa-sync-alt");
            icon.classList.add("fa-check");
            btn.classList.remove(
              "bg-brand",
              "hover:bg-brand-hover",
              "opacity-75",
              "pointer-events-none",
            );
            btn.classList.add("bg-emerald-500", "hover:bg-emerald-600");
            btn.innerText = " Synced!";
            btn.prepend(icon);

            await fetchLibrary();

            setTimeout(() => {
              icon.classList.remove("fa-check");
              icon.classList.add("fa-sync-alt");
              btn.classList.remove("bg-emerald-500", "hover:bg-emerald-600");
              btn.classList.add("bg-brand", "hover:bg-brand-hover");
              btn.innerText = " Sync";
              btn.prepend(icon);
            }, 2000);
          } else {
            icon.classList.remove("fa-spin");
            btn.classList.remove("opacity-75", "pointer-events-none");
            btn.innerText = " Sync";
            btn.prepend(icon);

            const data = await response.json();
            alert(`Sync Error: ${data.detail}`);
          }
        } catch (error) {
          icon.classList.remove("fa-spin");
          btn.classList.remove("opacity-75", "pointer-events-none");
          btn.innerText = " Sync";
          btn.prepend(icon);

          console.error(error);
          alert("Failed to connect to backend sync.");
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        fetchLibrary();

        const globalSearchInput = document.getElementById("globalSearchInput");
        if (globalSearchInput) {
          globalSearchInput.addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
              const query = e.target.value.trim();
              if (query)
                window.location.href = `/search?q=${encodeURIComponent(query)}`;
            }
          });
        }

        const scrollContainer = document.getElementById("tableContainer");
        const btn = document.getElementById("scrollToTopBtn");

        if (scrollContainer && btn) {
          scrollContainer.addEventListener("scroll", () => {
            if (scrollContainer.scrollTop > 300) {
              btn.classList.remove(
                "opacity-0",
                "translate-y-4",
                "pointer-events-none",
              );
              btn.classList.add(
                "opacity-100",
                "translate-y-0",
                "pointer-events-auto",
              );
            } else {
              btn.classList.add(
                "opacity-0",
                "translate-y-4",
                "pointer-events-none",
              );
              btn.classList.remove(
                "opacity-100",
                "translate-y-0",
                "pointer-events-auto",
              );
            }
          });
        }
      });

      function scrollToTop() {
        const scrollContainer = document.getElementById("tableContainer");
        if (scrollContainer)
          scrollContainer.scrollTo({ top: 0, behavior: "smooth" });
      }
    </script>
  </body>
</html>
